<!-- 客户端 API 层（Phase 1.2 起，逐步替换 Mock / sessionStorage） -->
<script>
  window.api = window.api || {};
  // 密保问题固定一句；答案 trim 后 SHA-256 哈希，库内不存明文
  const API_SEC_QUESTION = '你小时候最爱吃的一道菜叫什么？';
  async function apiSha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  window.api.auth = {
    // 注册：username 映射成 {username}@yjsg.local；昵称/密保经 options.data 由触发器落 profiles
    async register({ username, password, nickname, securityAnswer }) {
      const u = username.trim();
      const { data, error } = await window.sb.auth.signUp({
        email: u + '@yjsg.com',
        password,
        options: { data: {
          username: u,
          nickname: nickname.trim(),
          security_question: API_SEC_QUESTION,
          security_answer_hash: await apiSha256(securityAnswer.trim())
        } }
      });
      return { data, error };
    },
    // 登录
    async login({ username, password }) {
      const { data, error } = await window.sb.auth.signInWithPassword({
        email: username.trim() + '@yjsg.com',
        password
      });
      return { data, error };
    },
    // 退出
    async logout() {
      const { error } = await window.sb.auth.signOut();
      return { error };
    },
    // 密保找回-验答案（→ token）
    async forgotAnswer({ username, answer }) {
      const { data, error } = await window.sb.functions.invoke('auth-forgot', { body: { action: 'verify-answer', username, answer } });
      return data || { ok: false, error: (error && error.message) || '请求失败' };
    },
    // 密保找回-重置密码
    async forgotReset({ token, newPassword }) {
      const { data, error } = await window.sb.functions.invoke('auth-forgot', { body: { action: 'reset', token, newPassword } });
      return data || { ok: false, error: (error && error.message) || '请求失败' };
    },
    // 改密（先以当前密码验身份）
    async changePassword({ currentPassword, newPassword }) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return { ok: false, error: '未登录' };
      const { error: e1 } = await window.sb.auth.signInWithPassword({ email: u.email, password: currentPassword });
      if (e1) return { ok: false, error: '当前密码不正确' };
      const { error } = await window.sb.auth.updateUser({ password: newPassword });
      return error ? { ok: false, error: error.message } : { ok: true };
    },
    // 改密保答案（问题固定不变）
    async changeSecurityAnswer({ currentPassword, newAnswer }) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return { ok: false, error: '未登录' };
      const { error: e1 } = await window.sb.auth.signInWithPassword({ email: u.email, password: currentPassword });
      if (e1) return { ok: false, error: '当前密码不正确' };
      const hash = await apiSha256(newAnswer.trim());
      const { error } = await window.sb.from('profiles').update({ security_answer_hash: hash, updated_at: new Date().toISOString() }).eq('id', u.id);
      return error ? { ok: false, error: error.message } : { ok: true };
    },
    // 当前用户资料（未登录返回 null）
    async me() {
      const { data: { user } } = await window.sb.auth.getUser();
      if (!user) return null;
      const { data: prof } = await window.sb.from('profiles').select('id,username,nickname,avatar_url,gender,birthday,hometown,dish').eq('id', user.id).maybeSingle();
      return prof || { id: user.id };
    }
  };

  // ═══ 家谱称谓推导引擎 ═══ 移植 src/engine/{relation-graph,kinship-derive,tang-biao,age-compare}
  // 字段适配 DB：成员 birth_date/birth_type/created_at；边 {type:'parent_of'|'spouse_of', from, to}。农历不转阳历（长幼近似）。
  // 修正原 engine classifyBoShu 伯/叔反向 bug。纯函数、全局，供 api.family 与 P20 复用。
  function keBuildGraph(members, relations) {
    const nodes = new Map(), edges = new Map();
    for (const m of members) {
      nodes.set(m.id, { gender: m.gender, birthDate: m.birth_date || null, birthType: m.birth_type || 'solar', createdAt: m.created_at });
      edges.set(m.id, []);
    }
    for (const r of relations) {
      const f = nodes.get(r.from), t = nodes.get(r.to);
      if (!f || !t) continue;
      if (r.type === 'parent_of') {
        edges.get(r.to).push({ target: r.from, type:'parent_of', direction:'up', parentGender: f.gender });
        edges.get(r.from).push({ target: r.to, type:'parent_of', direction:'down', parentGender: null });
      } else if (r.type === 'spouse_of') {
        edges.get(r.from).push({ target: r.to, type:'spouse_of', direction:'side', parentGender: null });
        edges.get(r.to).push({ target: r.from, type:'spouse_of', direction:'side', parentGender: null });
      }
    }
    return { nodes, edges };
  }
  function keShortestPath(graph, egoId, alterId) {
    if (egoId === alterId) return [];
    const visited = new Set([egoId]);
    const queue = [{ nodeId: egoId, path: [] }];
    let best = null, bestSide = Infinity;
    while (queue.length) {
      const { nodeId, path } = queue.shift();
      for (const e of (graph.edges.get(nodeId) || [])) {
        if (visited.has(e.target) && e.target !== alterId) continue;
        const nn = graph.nodes.get(e.target);
        if (!nn) continue;
        const step = { direction: e.direction, nodeId: e.target, gender: nn.gender, birthDate: nn.birthDate, parentGender: e.parentGender || null };
        const np = [...path, step];
        if (e.target === alterId) { const sc = np.filter(s => s.direction === 'side').length; if (sc < bestSide) { best = np; bestSide = sc; } continue; }
        visited.add(e.target);
        queue.push({ nodeId: e.target, path: np });
      }
    }
    return best;
  }
  function keAllAncestors(graph, nodeId) {
    const anc = new Map(), vis = new Set(), q = [{ nodeId, dist: 0 }];
    while (q.length) {
      const { nodeId: cur, dist } = q.shift();
      if (vis.has(cur)) continue; vis.add(cur);
      for (const e of (graph.edges.get(cur) || [])) if (e.direction === 'up') { anc.set(e.target, dist+1); q.push({ nodeId: e.target, dist: dist+1 }); }
    }
    return anc;
  }
  function keFindLCA(graph, a, b) {
    const aa = keAllAncestors(graph, a), ab = keAllAncestors(graph, b);
    let best = null, bd = Infinity;
    for (const [id, d1] of aa) if (ab.has(id)) { const d = d1 + ab.get(id); if (d < bd) { bd = d; best = id; } }
    return best;
  }
  function kePathFromAncestor(graph, ancId, descId) {
    const path = [];
    (function dfs(cur, tgt, cp, vis){
      if (cur === tgt) { path.push(...cp); return true; }
      vis.add(cur);
      for (const e of (graph.edges.get(cur) || [])) {
        if (e.direction === 'down' && !vis.has(e.target)) {
          const node = graph.nodes.get(e.target); if (!node) continue;
          const pn = graph.nodes.get(cur);
          const step = { direction:'down', nodeId:e.target, gender:node.gender, birthDate:node.birthDate, parentNode: pn, parentGender: pn ? pn.gender : null };
          if (dfs(e.target, tgt, [...cp, step], new Set(vis))) return true;
        }
      }
      return false;
    })(ancId, descId, [], new Set());
    return path;
  }
  function keCompareAge(ego, peer) {
    // 优先用完整日期；其次用出生年份（结合当前日历）；再次用 created_at
    const nd = m => { if (!m || !m.birth_date) return null; const d = new Date(m.birth_date); return isNaN(d.getTime()) ? null : d; };
    const ed = nd(ego), pd = nd(peer);
    if (ed && pd) return ed < pd ? 'ego_older' : 'peer_older';
    // 如果只有年份没有月日，用年份比较（当前日历对比）
    const by = m => { if (!m || !m.birth_date) return null; const y = parseInt(String(m.birth_date).slice(0,4)); return isNaN(y) ? null : y; };
    const eby = by(ego), pby = by(peer);
    if (eby && pby && eby !== pby) return eby < pby ? 'ego_older' : 'peer_older'; // ego 出生年份更早 → ego 更年长
    if (ed && !pd) return 'ego_older';
    if (!ed && pd) return 'peer_older';
    const ec = new Date((ego && ego.created_at) || 0), pc = new Date((peer && peer.created_at) || 0);
    if (isNaN(ec.getTime()) || isNaN(pc.getTime())) return 'unknown';
    return ec < pc ? 'ego_older' : 'peer_older';
  }
  // 伯/叔：uncle 比 father 年长 → 伯父；年幼 → 叔叔（修正原 engine 反向 bug）
  function keClassifyBoShu(father, uncle) { return keCompareAge(father, uncle) === 'peer_older' ? '伯父' : '叔叔'; }
  function keClassifyCousin(graph, egoId, peerId) {
    const lca = keFindLCA(graph, egoId, peerId);
    if (!lca) return 'biao';
    const pe = kePathFromAncestor(graph, lca, egoId), pp = kePathFromAncestor(graph, lca, peerId);
    const allP = p => p.length > 0 && p.every(s => s.direction === 'down' && s.parentNode && s.parentNode.gender === 'male');
    return (allP(pe) && allP(pp)) ? 'tang' : 'biao';
  }
  const KE_UP = { 'M':{1:'父亲',2:'爷爷',3:'曾祖父',4:'高祖父'}, 'F':{1:'母亲',2:'奶奶',3:'曾祖母',4:'高祖母'} };
  const KE_MUP = { 'M':{2:'外公',3:'曾外祖父',4:'外高祖父'}, 'F':{2:'外婆',3:'曾外祖母',4:'外高祖母'} };
  const KE_DOWN = { 'M':{1:'儿子',2:'孙子',3:'曾孙',4:'玄孙'}, 'F':{1:'女儿',2:'孙女',3:'曾孙女',4:'玄孙女'} };
  function keDerive(graph, egoId, alterId, members) {
    if (egoId === alterId) return '自己';
    const path = keShortestPath(graph, egoId, alterId);
    if (!path || path.length === 0) return '家人';
    if (path.length > 5) return '长辈';
    let up=0, down=0, side=0; const gchain=[], pg=[];
    for (const s of path) { gchain.push(s.gender); if (s.direction==='up'){up++; if(s.parentGender)pg.push(s.parentGender);} else if(s.direction==='down')down++; else side++; }
    const ego = graph.nodes.get(egoId), alter = graph.nodes.get(alterId);
    if (!ego || !alter) return '家人';
    const ag = alter.gender === 'female' ? 'F' : 'M';
    const findMem = id => members.find(m => m.id === id);
    if (side > 0) { // 姻亲（含配偶边）
      if (up === 0 && down === 0) return alter.gender === 'male' ? '丈夫' : '妻子';
      if (up === 1 && down === 0) {
        // 如果第一步是 up（走到自己的父/母），那么 up+side 就是父/母的配偶 = 自己的另一位父/母
        if (path[0].direction === 'up') {
          return path[0].parentGender === 'male' ? '母亲' : '父亲';
        }
        // 否则：先走 side（走到配偶）再 up（配偶的父/母）= 岳父/岳母/公公/婆婆
        return alter.gender === 'male' ? (ego.gender === 'male' ? '岳父' : '公公') : (ego.gender === 'male' ? '岳母' : '婆婆');
      }
      if (up === 0 && down === 1) return alter.gender === 'male' ? '女婿' : '儿媳';
      return '家人';
    }
    if (up > 0 && down === 0) { // 直系长辈
      if (pg[0] === 'male') return KE_UP[ag][up] || '长辈';
      if (up === 1) return '母亲';
      return KE_MUP[ag][up] || '长辈';
    }
    if (down > 0 && up === 0) return KE_DOWN[ag][down] || '晚辈'; // 直系晚辈
    if (up === down && up >= 2) { // 同辈旁系 堂/表
      const cc = keClassifyCousin(graph, egoId, alterId);
      const ar = keCompareAge(findMem(egoId), findMem(alterId));
      const pre = cc === 'tang' ? '堂' : '表';
      return ar === 'peer_older' ? pre + (alter.gender === 'male' ? '兄' : '姐') : pre + (alter.gender === 'male' ? '弟' : '妹');
    }
    if (up === 1 && down === 1) { // 亲兄弟姐妹
      const ar = keCompareAge(findMem(egoId), findMem(alterId));
      if (ar === 'peer_older') return alter.gender === 'male' ? '哥哥' : '姐姐';
      return alter.gender === 'male' ? '弟弟' : '妹妹';
    }
    if (up === 2 && down === 1) { // 父辈旁系
      const viaFather = path[0].parentGender === 'male';
      if (viaFather) {
        if (alter.gender === 'male') { const father = findMem(path[0].nodeId), uncle = findMem(alterId); if (father && uncle) return keClassifyBoShu(father, uncle); return '伯父/叔叔'; }
        return '姑姑';
      }
      return alter.gender === 'male' ? '舅舅' : '阿姨';
    }
    if (up === 1 && down === 2) { // 子辈旁系
      const viaBrother = path[0].parentGender === 'male';
      if (viaBrother) return alter.gender === 'male' ? '侄子' : '侄女';
      return alter.gender === 'male' ? '外甥' : '外甥女';
    }
    if (up > down) return '长辈';
    if (up < down) return '晚辈';
    return '家人';
  }

  // 家族
  window.api.family = {
    // 创建家族：生成 6 位码（碰撞重试）+ 插 families + 插创建者节点
    async create({ name, surname, myName }) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return { ok: false, error: '未登录' };
      // 限制：每个用户最多创建 3 个家族
      const { count: famCount } = await window.sb.from('family_members').select('*', { count: 'exact', head: true }).eq('user_id', u.id).eq('role', 'creator');
      if (famCount >= 3) return { ok: false, error: '每个账号最多创建 3 个家族' };
      const { data: prof } = await window.sb.from('profiles').select('gender').eq('id', u.id).maybeSingle();
      const g = (prof && prof.gender === '女') ? 'female' : 'male'; // 性别以 profile 为准，无则占位 male（后续定位/编辑可改）
      let fam = null, lastErr = null;
      for (let i = 0; i < 8; i++) {
        const code = Math.random().toString(36).slice(2, 8).toUpperCase().padEnd(6, 'A').slice(0, 6);
        const { data, error } = await window.sb.from('families').insert({ name, surname, code, creator_id: u.id }).select().single();
        if (!error) { fam = data; break; }
        if (!/duplicate|unique|23505/i.test(error.message)) { lastErr = error.message; break; }
      }
      if (!fam) return { ok: false, error: lastErr || '生成代码失败，请重试' };
      const { error: e2 } = await window.sb.from('family_members').insert({ family_id: fam.id, user_id: u.id, name: myName, gender: g, status: 'claimed', role: 'creator' });
      if (e2) return { ok: false, error: e2.message };
      return { ok: true, family: fam };
    },
    // 凭码加入：走 request_join RPC（服务端按 code 查 family + 建 pending，绕 RLS）
    async joinByCode(code) {
      const { data, error } = await window.sb.rpc('request_join', { p_code: String(code || '').toUpperCase() });
      if (error) return { ok: false, error: (error.message || '').replace(/^ERROR:\s*/i, '').replace(/^PGRST\d+:\s*/i, '').slice(0, 80) || '加入失败' };
      return { ok: true, pending: true, familyName: data && data[0] && data[0].family_name };
    },
    // 我加入的家族列表
    async list() {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return [];
      const { data } = await window.sb.from('family_members').select('family_id,role,families(id,name,surname,code)').eq('user_id', u.id);
      return (data || []).map(m => ({
        id: m.families && m.families.id,
        name: m.families && m.families.name,
        surname: m.families && m.families.surname,
        code: m.families && m.families.code,
        role: m.role === 'creator' ? '创建者' : '成员'
      })).filter(f => f.id);
    },
    // 家族详情 + 是否创建者
    async get(id) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return null;
      const { data: fam } = await window.sb.from('families').select('id,name,surname,description,code,creator_id').eq('id', id).maybeSingle();
      if (!fam) return null;
      return Object.assign({}, fam, { isCreator: fam.creator_id === u.id });
    },
    // 成员列表（只读；关系·名字待 2.5 称谓落库后补）
    async members(id) {
      const { data } = await window.sb.from('family_members').select('id,name,role,status,gender,user_id').eq('family_id', id).order('created_at');
      return data || [];
    },
    // 编辑家族信息（creator；RLS families_update 放行）
    async edit(id, patch) {
      const p = { updated_at: new Date().toISOString() };
      if (patch.name !== undefined) p.name = patch.name;
      if (patch.surname !== undefined) p.surname = patch.surname;
      if (patch.description !== undefined) p.description = patch.description;
      const { data, error } = await window.sb.from('families').update(p).eq('id', id).select().single();
      if (error) return { ok: false, error: error.message };
      return { ok: true, family: data };
    },
    // 拉家谱：成员节点 + 关系边（边字段名扁平化为 type/from/to）
    async graph(id) {
      const [m, r] = await Promise.all([
        window.sb.from('family_members').select('id,user_id,name,gender,birth_date,birth_type,death_year,hometown,dish,avatar_url,status,role,created_at').eq('family_id', id).order('created_at'),
        window.sb.from('family_relations').select('relation_type,from_member,to_member').eq('family_id', id),
      ]);
      return {
        members: (m.data || []),
        relations: (r.data || []).map(x => ({ type: x.relation_type, from: x.from_member, to: x.to_member })),
      };
    },
    // 添加家人（定位法）：选已有成员 relWith + 6 关系 rel → 建 placeholder/deceased 节点 + parent_of/spouse_of 边。
    // 定位语义（语句A，最终版，UI 文案与此一致）：label 描述 新成员(target) 相对 已有成员(ego=relWith) 的角色 —— "新成员 是 ego 的 label"。
    //   父亲/母亲 → 新成员是 ego 的父/母 → parent_of from target（新成员在 ego 上方）；
    //   儿子/女儿 → 新成员是 ego 的子/女 → parent_of from ego（新成员在 ego 下方）；
    //   丈夫/妻子 → 新成员是 ego 的配偶 → spouse_of（同代）。性别一律由 label 推导（父/子/夫→male，余→female），无需手选。
    async addMember({ familyId, name, relWithId, rel, birthYear, birthMonth, birthDay, bType, deathYear, hometown, dish }) {
      // ego=relWith(已有)、target=新成员；from/to 中 'ego'=relWithId、'target'=新成员id
      const LABEL_EDGE = {
        '父亲': { type:'parent_of', from:'target', to:'ego', gender:'male' },
        '母亲': { type:'parent_of', from:'target', to:'ego', gender:'female' },
        '儿子': { type:'parent_of', from:'ego', to:'target', gender:'male' },
        '女儿': { type:'parent_of', from:'ego', to:'target', gender:'female' },
        '丈夫': { type:'spouse_of', from:'ego', to:'target', gender:'male' },
        '妻子': { type:'spouse_of', from:'ego', to:'target', gender:'female' },
      };
      const rule = LABEL_EDGE[rel];
      if (!rule) return { ok:false, error:'关系无效' };
      if (!name || !name.trim()) return { ok:false, error:'请填写姓名' };
      const { data: ego } = await window.sb.from('family_members').select('id,gender').eq('id', relWithId).maybeSingle();
      if (!ego) return { ok:false, error:'参照成员不存在' };
      const birth_date = birthYear ? `${birthYear}-${(birthMonth||'01').padStart(2,'0')}-${(birthDay||'01').padStart(2,'0')}` : null;
      const mem = {
        family_id: familyId, name: name.trim(), gender: rule.gender,
        birth_date, birth_type: (bType==='农历') ? 'lunar' : 'solar',
        death_year: deathYear ? Number(deathYear) : null,
        hometown: hometown || null, dish: dish || null,
        status: deathYear ? 'deceased' : 'placeholder', role: 'member',
      };
      const { data: ins, error: e1 } = await window.sb.from('family_members').insert(mem).select().single();
      if (e1) return { ok:false, error: e1.message };
      const newId = ins.id;
      const edge = {
        family_id: familyId, relation_type: rule.type,
        from_member: rule.from === 'ego' ? relWithId : newId,
        to_member: rule.to === 'ego' ? relWithId : newId,
      };
      const { error: e2 } = await window.sb.from('family_relations').insert(edge);
      if (e2) return { ok:false, error: e2.message, member: ins }; // 节点已建、边失败：节点留存（务实版不回滚）
      this.rebuildKinship(familyId); // 称谓落库（不阻塞）
      return { ok:true, member: ins };
    },
    // 编辑成员资料（creator 或 本人；RLS fm_update 放行）。deathYear 变化联动 status。
    async updateMember(id, patch) {
      const p = { updated_at: new Date().toISOString() };
      if (patch.name !== undefined) p.name = patch.name;
      if (patch.gender !== undefined) p.gender = patch.gender;
      if (patch.hometown !== undefined) p.hometown = patch.hometown || null;
      if (patch.dish !== undefined) p.dish = patch.dish || null;
      if (patch.bType !== undefined) p.birth_type = (patch.bType==='农历') ? 'lunar' : 'solar';
      if (patch.birthYear !== undefined) {
        p.birth_date = patch.birthYear ? `${patch.birthYear}-${(patch.birthMonth||'01').padStart(2,'0')}-${(patch.birthDay||'01').padStart(2,'0')}` : null;
      }
      if (patch.deathYear !== undefined) {
        const dy = patch.deathYear ? Number(patch.deathYear) : null;
        p.death_year = dy;
        if (dy) { p.status = 'deceased'; }
        else { // 清除离世年份 → 回到 placeholder/claimed（按是否有 user_id）
          const { data: cur } = await window.sb.from('family_members').select('user_id').eq('id', id).maybeSingle();
          p.status = (cur && cur.user_id) ? 'claimed' : 'placeholder';
        }
      }
      const { data, error } = await window.sb.from('family_members').update(p).eq('id', id).select().single();
      if (error) return { ok:false, error: error.message };
      if ((patch.gender !== undefined || patch.deathYear !== undefined || patch.birthYear !== undefined) && data && data.family_id) this.rebuildKinship(data.family_id); // 性别/生日/状态变化影响称谓（兄弟长幼）
      return { ok:true, member: data };
    },
    // 据 members+relations 推「我(meId)→每个成员」的称谓（前端移植引擎，无缓存/无部署）。返回 {memberId: 称谓}。
    deriveLabelsFromMe(members, relations, meId) {
      const labels = {};
      if (!meId) return labels;
      const graph = keBuildGraph(members, relations);
      for (const m of members) labels[m.id] = (m.id === meId) ? '我' : keDerive(graph, meId, m.id, members);
      return labels;
    },
    // 称谓落库（2.5.4）：成员/关系变更后，让 kinship-rebuild Edge Function 全量重算该家族的
    // kinship_cache（ego→alter），供服务端/下游只读。前端显示仍用 deriveLabelsFromMe 现算（同算法、即时）。
    // 失败不阻塞用户操作（fire-and-forget）。
    async rebuildKinship(familyId) {
      if (!familyId) return { ok:false };
      try {
        const token = (await window.sb.auth.getSession()).data.session?.access_token || '';
        const r = await fetch(`${window.SUPABASE_URL}/functions/v1/kinship-rebuild`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'apikey': window.SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ family_id: familyId }),
        });
        return await r.json();
      } catch (e) { return { ok:false, error:String(e) }; }
    },
    // 凭码预览家族成员（加入者用；P3 选谁建关系 / 认领谁）。校验码 + 非成员。
    async joinPreview(code) {
      const { data, error } = await window.sb.rpc('join_preview', { p_code: String(code||'').toUpperCase() });
      if (error) return { ok:false, error: (error.message||'').replace(/^ERROR:\s*/i,'').replace(/^PGRST\d+:\s*/i,'').slice(0,80) || '查询失败', members:[] };
      const rows = data || [];
      if (!rows.length) return { ok:false, error: '家族暂无成员', members:[] };
      return {
        ok:true,
        familyId: rows[0].o_family_id, familyName: rows[0].o_family_name,
        isOldCode: rows[0].o_is_old_code || false,
        members: rows.map(r => ({ id:r.o_member_id, name:r.o_member_name, gender:r.o_member_gender, status:r.o_member_status })),
      };
    },
    // relate：凭码 + 选已有成员 + 关系 → 建自己的 claimed 节点 + parent_of/spouse_of 边 + 入伙（auto-approve）
    async relate({ code, relWithId, rel, name, gender, birthYear, birthMonth, birthDay, bType }) {
      const birth_date = birthYear ? `${birthYear}-${(birthMonth||'01').padStart(2,'0')}-${(birthDay||'01').padStart(2,'0')}` : null;
      const { data, error } = await window.sb.rpc('relate', {
        p_code: String(code||'').toUpperCase(), p_rel_with_id: relWithId, p_rel: rel, p_name: name,
        p_gender: gender, p_birth_date: birth_date, p_birth_type: (bType==='农历')?'lunar':'solar',
      });
      if (error) return { ok:false, error: (error.message||'').replace(/^ERROR:\s*/i,'').replace(/^PGRST\d+:\s*/i,'').slice(0,80) || '加入失败' };
      const r = data && data[0];
      if (r && r.o_family_id) this.rebuildKinship(r.o_family_id); // 称谓落库
      return { ok:true, familyId: r && r.o_family_id, familyName: r && r.o_family_name };
    },
    // claim：凭码 + 选占位节点 → 把 user_id 落到该节点（认领）+ 入伙（auto-approve）
    async claim({ code, nodeId, name }) {
      const { data, error } = await window.sb.rpc('claim', { p_code: String(code||'').toUpperCase(), p_node_id: nodeId, p_name: name || '' });
      if (error) return { ok:false, error: (error.message||'').replace(/^ERROR:\s*/i,'').replace(/^PGRST\d+:\s*/i,'').slice(0,80) || '认领失败' };
      const r = data && data[0];
      return { ok:true, familyId: r && r.o_family_id, familyName: r && r.o_family_name };
    },
    // setRelation：重定位成员关系（删其「作为子女的 parent_of」+ 全部 spouse_of，按 label-to-edge 语句A 加新边；保留作为父母的边＝子女不断）。性别不动（称呼由 kinship 据 gender+边现算）。
    async setRelation({ familyId, memberId, anchorId, rel }) {
      const LABEL_EDGE = {
        '父亲': { type:'parent_of', from:'target', to:'ego' },
        '母亲': { type:'parent_of', from:'target', to:'ego' },
        '儿子': { type:'parent_of', from:'ego', to:'target' },
        '女儿': { type:'parent_of', from:'ego', to:'target' },
        '丈夫': { type:'spouse_of', from:'ego', to:'target' },
        '妻子': { type:'spouse_of', from:'ego', to:'target' },
      };
      const rule = LABEL_EDGE[rel];
      if (!rule) return { ok:false, error:'关系无效' };
      if (!familyId || !memberId || !anchorId) return { ok:false, error:'参数缺失' };
      if (memberId === anchorId) return { ok:false, error:'不能与自己建立关系' };
      // 1. 删该成员「作为子女的 parent_of」(to=member) + 全部 spouse_of（涉及 member）
      await window.sb.from('family_relations').delete().eq('family_id', familyId).eq('relation_type','parent_of').eq('to_member', memberId);
      await window.sb.from('family_relations').delete().eq('family_id', familyId).eq('relation_type','spouse_of').or('from_member.eq.'+memberId+',to_member.eq.'+memberId);
      // 2. 加新边（member=target 新位，anchor=ego 已有）
      const edge = {
        family_id: familyId, relation_type: rule.type,
        from_member: rule.from === 'ego' ? anchorId : memberId,
        to_member: rule.to === 'ego' ? anchorId : memberId,
      };
      const { error } = await window.sb.from('family_relations').insert(edge);
      if (error) return { ok:false, error: error.message };
      this.rebuildKinship(familyId); // 关系重定位 → 称谓落库
      return { ok:true };
    },

    // 退出家族（普通成员；创建者须先转让）。RPC leave_family：节点 user_id 置空→placeholder，保留家谱节点与关系。
    async leave(familyId) {
      const { data, error } = await window.sb.rpc('leave_family', { p_family_id: familyId });
      if (error) return { ok: false, error: (error.message || '').replace(/^ERROR:\s*/i, '').replace(/^PGRST\d+:\s*/i, '').slice(0, 80) || '退出失败' };
      return { ok: true };
    },

    // 转让创建者（仅创建者）。RPC transfer_creator：换 families.creator_id + 旧 creator→member、新 creator→creator。
    async transferCreator(familyId, newMemberId) {
      const { data, error } = await window.sb.rpc('transfer_creator', { p_family_id: familyId, p_new_member_id: newMemberId });
      if (error) return { ok: false, error: (error.message || '').replace(/^ERROR:\s*/i, '').replace(/^PGRST\d+:\s*/i, '').slice(0, 80) || '转让失败' };
      return { ok: true };
    },

    // 重置家族代码（仅创建者）。RPC reset_family_code：生成新 6 位码，旧码立即失效。
    async resetCode(familyId) {
      const { data, error } = await window.sb.rpc('reset_family_code', { p_family_id: familyId });
      if (error) return { ok: false, error: (error.message || '').replace(/^ERROR:\s*/i, '').replace(/^PGRST\d+:\s*/i, '').slice(0, 80) || '重置失败' };
      return { ok: true, newCode: data && data[0] && data[0].o_new_code };
    },

    // ── 2.6 审核（创建者专属）──
    // 待审核列表
    async pendingRequests(familyId) {
      const { data } = await window.sb.from('join_requests').select('id,applicant_id,type,node_id,statement,status,created_at,profiles(nickname,username)').eq('family_id', familyId).eq('status', 'pending').order('created_at');
      return (data || []).map(r => ({
        id: r.id, type: r.type, nodeId: r.node_id, statement: r.statement,
        createdAt: r.created_at,
        applicantName: (r.profiles && r.profiles.nickname) || (r.profiles && r.profiles.username) || '未知',
        applicantId: r.applicant_id
      }));
    },
    // 通过申请
    async approveRequest(requestId) {
      const { data, error } = await window.sb.rpc('approve_join_request', { p_request_id: requestId });
      if (error) return { ok: false, error: (error.message || '').replace(/^ERROR:\s*/i, '').replace(/^PGRST\d+:\s*/i, '').slice(0, 80) || '审核失败' };
      return { ok: true, memberId: data && data[0] && data[0].o_member_id };
    },
    // 驳回申请
    async rejectRequest(requestId) {
      const { data, error } = await window.sb.rpc('reject_join_request', { p_request_id: requestId });
      if (error) return { ok: false, error: (error.message || '').replace(/^ERROR:\s*/i, '').replace(/^PGRST\d+:\s*/i, '').slice(0, 80) || '驳回失败' };
      return { ok: true };
    }
  };

  window.api.anchor = {
    // 家族已点亮/待讲列表
    async list(familyId, status) {

      if (status) q = q.eq('status', status);

      const u = (await window.sb.auth.getUser()).data.user;
      // 查当前用户在该家族的 member 节点（用于取称谓）
      const myMid = u ? (await window.sb.from('family_members').select('id').eq('family_id', familyId).eq('user_id', u.id).maybeSingle())?.data?.id : null;
      // 如有我的节点则取 kinship_cache 称谓，否则仅名字
      let kinMap = {};
      if (myMid) {
        const { data: kc } = await window.sb.from('kinship_cache').select('alter_id,kinship_term').eq('family_id', familyId).eq('ego_id', myMid);
        for (const k of (kc || [])) kinMap[k.alter_id] = k.kinship_term;
      }
      return (data || []).map(a => {
        const memName = a.family_members?.name || '';
        const term = kinMap[a.by_member] || '';
        return {
          id: a.id, familyId: a.family_id, name: a.name, byMember: a.by_member,
          byMemberName: term ? (term + '·' + memName) : (memName || '家谱成员'),
          era: a.era, city: a.city, text: a.text, imgUrl: a.img_url,

          createdBy: a.created_by, createdAt: a.created_at,

    // 详情（含 by 成员名）
    async get(id) {

        id: a.id, familyId: a.family_id, name: a.name,
        byMember: a.by_member, byMemberName: a.family_members?.name || (a.profiles?.nickname || a.profiles?.username),
        era: a.era, city: a.city, province: a.province, text: a.text, imgUrl: a.img_url,
        status: a.status, tags: a.tags || [], grayLabel: a.gray_label,
        createdBy: a.created_by, createdAt: a.created_at,
        isOwner: a.created_by === u?.id

    // 创建锚点
    async create({ familyId, name, byMember, era, city, province, text, imgUrl, status, tags, grayLabel }) {
      const u = (await window.sb.auth.getUser()).data.user;

        family_id: familyId, name, by_member: byMember, era, city, province,

        tags: tags || [], gray_label: grayLabel || '',

    },
    // 编辑锚点
    async update(id, patch) {

      if (error) return { ok: false, error: error.message };

    // 删除锚点

    // 搜索（anchors + members 混合）

    }

  // ── 用户设置（通知偏好；profiles.notif_prefs，RLS 本人可改）──
  window.api.settings = {
    async getPrefs() {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return null;
      const { data } = await window.sb.from('profiles').select('notif_prefs').eq('id', u.id).maybeSingle();
      return (data && data.notif_prefs) || { activity:true, mention:true, review:true, capsule:true, weekly:true };
    },
    async setPrefs(patch) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return { ok:false, error:'未登录' };
      const cur = await this.getPrefs();
      const next = { ...cur, ...patch };
      const { error } = await window.sb.from('profiles').update({ notif_prefs: next }).eq('id', u.id);
      if (error) return { ok:false, error: error.message };
      return { ok:true, prefs: next };
    }
  };

  // ── Phase 4: 对话 API ──
  window.api.conversation = {
    // 新建对话
    async create({ familyId, anchorId, type, title, entryContext }) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return { ok: false, error: '未登录' };
      const { data, error } = await window.sb.from('conversations').insert({
        user_id: u.id, family_id: familyId, anchor_id: anchorId,
        type: type || 'new', title: title || '',
        entry_context: entryContext || {},
        status: 'active'
      }).select().single();
      if (error) return { ok: false, error: error.message };
      return { ok: true, conversation: data };
    },
    // 我的对话列表
    async list(filters = {}) {
      let q = window.sb.from('conversations').select('id,family_id,anchor_id,type,title,status,created_at,updated_at').order('updated_at', { ascending: false });
      if (filters.type) q = q.eq('type', filters.type);
      if (filters.status) q = q.eq('status', filters.status);
      if (filters.familyId) q = q.eq('family_id', filters.familyId);
      const { data } = await q;
      return data || [];
    },
    // 草稿列表
    async drafts() {
      return this.list({ status: 'draft' });
    },
    // 对话详情（含消息）
    async get(id) {
      const { data: conv } = await window.sb.from('conversations').select('*').eq('id', id).maybeSingle();
      if (!conv) return null;
      const { data: msgs } = await window.sb.from('conversation_messages').select('*').eq('conversation_id', id).order('created_at');
      return { ...conv, messages: msgs || [] };
    },
    // 发消息（暂不调 AI——4.3 agent-chat 会接管；此处仅做纯存储）
    async addMessage(conversationId, role, content, metadata = {}) {
      const { data, error } = await window.sb.from('conversation_messages').insert({
        conversation_id: conversationId, role, content, metadata
      }).select().single();
      if (error) return { ok: false, error: error.message };
      return { ok: true, message: data };
    },
    // 更新对话状态
    async update(id, patch) {
      const p = { updated_at: new Date().toISOString() };
      if (patch.title !== undefined) p.title = patch.title;
      if (patch.status !== undefined) p.status = patch.status;
      if (patch.state !== undefined) p.state = patch.state;
      const { error } = await window.sb.from('conversations').update(p).eq('id', id);
      if (error) return { ok: false, error: error.message };
      return { ok: true };
    },
    // 删除对话
    async remove(id) {
      const { error } = await window.sb.from('conversations').delete().eq('id', id);
      if (error) return { ok: false, error: error.message };
      return { ok: true };
    },
    // 发消息给 Agent（4.3 agent-chat）：Edge Function 内部已落库 user+assistant 两条消息并更新 state。
    // 返回 { ok, reply, state, cta_ready } 或 { ok:false, error }。
    async sendToAgent(conversationId, userMessage, context = {}) {
      const token = (await window.sb.auth.getSession()).data.session?.access_token || '';
      try {
        const r = await fetch(`${window.SUPABASE_URL}/functions/v1/agent-chat`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'apikey': window.SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: conversationId, user_message: userMessage, context }),
        });
        return await r.json();
      } catch (e) { return { ok: false, error: String(e) }; }
    },
    // 组装 agent-chat 的 context（family_name + 家谱节点含 hometown + 已有/灰锚点 + 入口）
    async buildContext(familyId, entryContext = {}) {
      const ctx = { entry_context: entryContext };
      try {
        const { data: fam } = await window.sb.from('families').select('name,surname').eq('id', familyId).maybeSingle();
        if (fam) { ctx.family_name = fam.name; ctx.surname = fam.surname; }
        const { data: mems } = await window.sb.from('family_members').select('name,hometown,gender,status').eq('family_id', familyId);
        ctx.family_tree_nodes = (mems || []).map(m => ({ name: m.name, hometown: m.hometown || '', gender: m.gender }));
        const { data: anchors } = await window.sb.from('anchors').select('name,status').eq('family_id', familyId);
        ctx.existing_anchors = (anchors || []).filter(a => a.status === 'lit').map(a => a.name);
        ctx.gray_anchors = (anchors || []).filter(a => a.status === 'gray').map(a => a.name);
      } catch (e) { /* context 尽力而为，缺失不阻塞对话 */ }
      return ctx;
    }
  };

  // ── Phase 5: 通知 / 动态 / 我的 API ──
  window.api.notif = {
    // 通知列表
    async list(limit = 30) {
      const { data } = await window.sb.from('notifications').select('*').order('created_at', { ascending: false }).limit(limit);
      return data || [];
    },
    // 未读数
    async unreadCount() {
      const { count, error } = await window.sb.from('notifications').select('*', { count: 'exact', head: true }).eq('read', false);
      if (error) return 0;
      return count || 0;
    },
    // 标记已读
    async markRead(id) {
      const { error } = await window.sb.from('notifications').update({ read: true }).eq('id', id);
      return !error;
    },
    // 全部已读
    async markAllRead() {
      const { error } = await window.sb.from('notifications').update({ read: true }).eq('read', false);
      return !error;
    }
  };

  window.api.feed = {
    // 动态 Feed（家族内聚合：anchors + comments + hooks）
    async list(familyId, filter = 'all') {
      const u = (await window.sb.auth.getUser()).data.user;
      const uid = u?.id;
      // 拉近期 lit anchors（点亮事件）
      const { data: anchors } = await window.sb.from('anchors').select('id,name,by_member,created_by,created_at,family_members!by_member(name)').eq('family_id', familyId).eq('status', 'lit').order('created_at', { ascending: false }).limit(30);
      // 拉近期 comments（补述事件）
      const { data: cmts } = await window.sb.from('comments').select('id,text,member_id,created_at,anchor:anchor_id(name,family_id),family_members!member_id(name)').order('created_at', { ascending: false }).limit(30);
      // 过滤出该家族的 comments
      const famCmts = (cmts || []).filter(c => c.anchor?.family_id === familyId);

      const items = [];
      for (const a of (anchors || [])) {
        items.push({ id: 'a_'+a.id, type: 'lit', title: '点亮了「' + a.name + '」', who: a.family_members?.name || '家谱成员', time: a.created_at, userId: a.created_by, anchorId: a.id, relatedToMe: a.created_by === uid || a.by_member === uid });
      }
      for (const c of famCmts) {
        items.push({ id: 'c_'+c.id, type: 'comment', title: '在「' + (c.anchor?.name || '') + '」下补述', who: c.family_members?.name || '家谱成员', time: c.created_at, text: c.text?.slice(0, 80), anchorId: c.anchor?.id, relatedToMe: c.member_id === uid });
      }
      // hooks (open hooks = 待回应)
      // 我在该家族的成员节点 id（用于判断是否被点名）
      const { data: myNode } = await window.sb.from('family_members').select('id').eq('family_id', familyId).eq('user_id', uid).maybeSingle();
      const myMemberId = myNode && myNode.id;
      const { data: hooks } = await window.sb.from('hooks').select('id,dish,created_by,target_members,created_at,profiles!created_by(nickname,username)').eq('family_id', familyId).eq('status', 'open').order('created_at', { ascending: false });
      for (const h of (hooks || [])) {
        const mine = h.created_by === uid;
        const named = myMemberId && (h.target_members || []).some(t => t === myMemberId);
        items.push({ id: 'h_'+h.id, type: 'hook', title: '抛了钩子「' + h.dish + '」', who: mine ? '我' : (h.profiles?.nickname || h.profiles?.username || '家人'), time: h.created_at, hookId: h.id, dish: h.dish, mine, relatedToMe: mine || named });
      }

      items.sort((a, b) => new Date(b.time) - new Date(a.time));
      if (filter === 'me') return items.filter(i => i.relatedToMe);
      if (filter === 'todo') return items.filter(i => i.type === 'hook' && i.relatedToMe);
      return items;
    }
  };

  // 我的（P50 统计）
  window.api.me = {
    async stats(familyId) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return null;
      const profile = await window.sb.from('profiles').select('*').eq('id', u.id).maybeSingle();
      // 我的记忆：仅当前家族（如未指定家族则全局）
      let memQ = window.sb.from('anchors').select('*', { count: 'exact', head: true }).eq('created_by', u.id);
      if (familyId) memQ = memQ.eq('family_id', familyId);
      const { count: memCount, error: memErr } = await memQ;
      // 点亮数：仅当前家族
      let litQ = window.sb.from('anchors').select('*', { count: 'exact', head: true }).eq('created_by', u.id).eq('status', 'lit');
      if (familyId) litQ = litQ.eq('family_id', familyId);
      const { count: litCount } = await litQ;
      // 草稿数：仅当前家族
      let draftQ = window.sb.from('conversations').select('*', { count: 'exact', head: true }).eq('user_id', u.id).eq('status', 'draft');
      if (familyId) draftQ = draftQ.eq('family_id', familyId);
      const { count: draftCount } = await draftQ;
      // 我的对话
      let convQ = window.sb.from('conversations').select('id,title,type,status,created_at').eq('user_id', u.id).order('updated_at', { ascending: false }).limit(20);
      if (familyId) convQ = convQ.eq('family_id', familyId);
      const { data: conversations } = await convQ;
      // 我的已点亮记忆（当前家族）——供 P50「我的记忆」点开查看；家族切换时随 familyId 变化
      let mineQ = window.sb.from('anchors').select('id,name,era,city,img_url,created_at').eq('created_by', u.id).eq('status', 'lit').order('created_at', { ascending: false });
      if (familyId) mineQ = mineQ.eq('family_id', familyId);
      const { data: myMems } = await mineQ;
      return {
        profile: profile?.data,
        memCount: memCount || 0,
        litCount: litCount || 0,
        draftCount: draftCount || 0,
        myMems: myMems || [],
        conversations: conversations || [],
        memberNodes: await window.sb.from('family_members').select('id,family_id,name,role,status').eq('user_id', u.id).then(r => r.data || []),
      };
    }
  };

  // ── Phase 7: 文件上传 API ──
  // 4:3 居中裁剪（§4.2）：读图→canvas 居中裁成 4:3→导出 jpeg blob（最长边 ≤1280）
  function cropTo43(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const ratio = 4/3;
        let sw = img.width, sh = img.height, sx = 0, sy = 0;
        if (sw/sh > ratio) { sw = sh*ratio; sx = (img.width - sw)/2; }
        else { sh = sw/ratio; sy = (img.height - sh)/2; }
        const W = Math.min(1280, Math.round(sw)), H = Math.round(W/ratio);
        const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
        cv.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
        cv.toBlob(b => { URL.revokeObjectURL(img.src); b ? resolve(b) : reject(new Error('裁剪失败')); }, 'image/jpeg', 0.85);
      };
      img.onerror = () => reject(new Error('图片读取失败'));
      img.src = URL.createObjectURL(file);
    });
  }
  window.cropTo43 = cropTo43;
  window.api.upload = {
    // 上传图片到指定桶，返回公开 URL。bucket: avatars|memories|chat|capsules
    async image(file, bucket, familyId) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return { ok: false, error: '未登录' };
      const ext = file.name.split('.').pop() || 'jpg';
      const path = `${familyId || 'user'}/${u.id}/${Date.now()}.${ext}`;
      const { data, error } = await window.sb.storage.from(bucket).upload(path, file, {
        cacheControl: '3600',
        upsert: false,
      });
      if (error) return { ok: false, error: error.message };
      // 获取公开 URL
      const { data: urlData } = window.sb.storage.from(bucket).getPublicUrl(path);
      return { ok: true, path, url: urlData?.publicUrl || '' };
    },
    // 4:3 裁剪后上传（§4.2）
    async imageCropped(file, bucket, familyId) {
      try {
        const blob = await cropTo43(file);
        const f = new File([blob], (file.name || 'img').replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg' });
        return await this.image(f, bucket, familyId);
      } catch (e) { return { ok: false, error: String(e) }; }
    },
    // 删除文件
    async remove(bucket, path) {
      const { error } = await window.sb.storage.from(bucket).remove([path]);
      if (error) return { ok: false, error: error.message };
      return { ok: true };
    }
  };

  // ── Phase 6: 胶囊 / 地图 / 纪念册 / 设置 API ──
  window.api.capsule = {
    // 胶囊列表（§5.1：已封存 + 已开启；脱离味道桌）
    async list(familyId) {
      const { data } = await window.sb.from('capsules').select('*').eq('family_id', familyId).order('created_at', { ascending: false });
      return data || [];
    },
    // 新建封存
    async create({ familyId, name, openDate, toMembers, storyId, anchorId, text, imgUrl }) {
      const u = (await window.sb.auth.getUser()).data.user;
      if (!u) return { ok: false, error: '未登录' };
      const { data, error } = await window.sb.from('capsules').insert({
        family_id: familyId, name, open_date: openDate,
        to_members: toMembers || [], story_id: storyId, anchor_id: anchorId,
        text: text || '', img_url: imgUrl,
        created_by: u.id, state: 'sealed'
      }).select().single();
      if (error) return { ok: false, error: error.message };
      // §5.1：设为胶囊即脱离味道桌——如果关联了 anchor，将其从 lit 列表移除（状态置 gray）
      if (anchorId) {
        await window.sb.from('anchors').update({ status: 'gray', updated_at: new Date().toISOString() }).eq('id', anchorId);
      }
      return { ok: true, capsule: data };
    },
    // 编辑
    async update(id, patch) {
      const { error } = await window.sb.from('capsules').update({ ...patch, updated_at: new Date().toISOString() }).eq('id', id);
      if (error) return { ok: false, error: error.message };
      return { ok: true };
    },
    // 提前开启
    async openEarly(id) {
      const { data, error } = await window.sb.rpc('open_capsule_early', { p_capsule_id: id });
      if (error) return { ok: false, error: (error.message || '').slice(0, 80) };
      return { ok: true };
    }
  };

  // 记忆地图（P60）城市聚合
  window.api.map = {
    async data(familyId) {
      const { data: anchors } = await window.sb.from('anchors').select('id,name,city,province,era,img_url,by_member,created_at,family_members!by_member(name)').eq('family_id', familyId).eq('status', 'lit').order('created_at');
      // 城市聚合（§6.1 封面=该城第一条记忆的吃食图）
      const cities = {};
      for (const a of (anchors || [])) {
        if (!a.city) continue;
        if (!cities[a.city]) cities[a.city] = { city: a.city, province: a.province || '', count: 0, cover: a.img_url || null, items: [] };
        cities[a.city].count++;
        if (!cities[a.city].cover && a.img_url) cities[a.city].cover = a.img_url;
        cities[a.city].items.push({ id: a.id, name: a.name, era: a.era, img: a.img_url, by: a.family_members?.name || '' });
      }
      // 时间轴（era → anchors）
      const timeline = (anchors || []).filter(a => a.era).map(a => ({ id: a.id, name: a.name, era: a.era, city: a.city, img: a.img_url, by: a.family_members?.name || '', year: parseInt(a.era) || null }));
      return { cities: Object.values(cities).sort((x,y)=>y.count-x.count), timeline: timeline.sort((a, b) => (a.year || 9999) - (b.year || 9999)) };
    }
  };

  // 纪念册（P61）AI 文案生成
  window.api.memorial = {
    async generate(familyId, scope = 'all', style = 'classic') {
      const u = (await window.sb.auth.getUser()).data.user;
      const token = (await window.sb.auth.getSession()).data.session?.access_token || '';
      const resp = await fetch(`${window.SUPABASE_URL}/functions/v1/ai-generate`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'apikey': window.SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'memorial', family_id: familyId, scope, style, user_name: u?.user_metadata?.nickname || '家人' })
      });
      return resp.json();
    }
  };

  // ── Phase 4.4–4.6: AI 生成 API ──
  window.api.ai = {
    async _call(action, body) {
      const token = (await window.sb.auth.getSession()).data.session?.access_token || '';
      const r = await fetch(`${window.SUPABASE_URL}/functions/v1/ai-generate`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'apikey': window.SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ action, ...body }),
      });
      return r.json();
    },
    // 整理成故事
    async generateStory(conversationId, familyContext) {
      return this._call('story', { conversation_id: conversationId, family_context: familyContext });
    },
    // AI 还原菜谱
    async generateRecipe(text, foodName) {
      return this._call('recipe', { text, food_name: foodName });
    },
    // AI 生成标签
    async generateTags(text) {
      return this._call('tags', { text });
    },
    // AI 生成人物生平（P21）
    async generateBio(memberId, familyId) {
      return this._call('bio', { member_id: memberId, family_id: familyId });
    }
  };
</script>

<script type="text/babel">
// ══════════════════════════════════════════════════
// SHARED — 设计令牌 + 公共组件
// ══════════════════════════════════════════════════
const C = {
  bg:'#FAF7F2', bgCard:'#FFFFFF',
  primary:'#285B4E', primaryDark:'#1C4238', primaryMid:'#376B5C',
  primaryLight:'#4A8A76', primaryPale:'#EBF5F0', primary100:'#D4EAE3',
  t1:'#2C1A0E', t2:'#7A6E65', t3:'#A09590', t4:'#C8BFB8',
  border:'#E6DFCF', inputBg:'#F2EDE5',

};

const AppContext = React.createContext({});
const useApp = () => React.useContext(AppContext);

function StatusBar() {

}

function BottomSheet({ open, onClose, title, children }) {
  return (
    <>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(28,16,8,0.42)', zIndex:100, opacity:open?1:0, pointerEvents:open?'all':'none', transition:'opacity 0.25s' }}/>
      <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'#FFFDF8', borderRadius:'22px 22px 0 0', zIndex:101, transform:open?'translateY(0)':'translateY(100%)', transition:'transform 0.32s cubic-bezier(0.32,0.72,0,1)', maxHeight:'84%', display:'flex', flexDirection:'column', boxShadow:'0 -4px 32px rgba(0,0,0,0.12)' }}>
        <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 0', flexShrink:0 }}>
          <div style={{ width:40, height:4, background:'#D8CEBF', borderRadius:2 }}/>

        {title && <div style={{ padding:'10px 22px 14px', fontSize:17, fontWeight:700, color:C.t1, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>{title}</div>}
        <div style={{ flex:1, overflowY:'auto', padding:'16px 22px 44px', WebkitOverflowScrolling:'touch' }}>{children}</div>
      </div>

}

function Toast({ message, visible }) {
  return (
    <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', background:'rgba(22,50,40,0.94)', color:'#fff', fontSize:14, fontWeight:500, padding:'10px 22px', borderRadius:10, zIndex:200, opacity:visible?1:0, pointerEvents:'none', transition:'opacity 0.2s', whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.2)' }}>
      {message}
    </div>
  );
}

function Btn({ children, onClick, variant='primary', size='md', disabled, fullWidth, xstyle }) {
  const sz = { lg:{height:52,fontSize:16,padding:'0 32px'}, md:{height:48,fontSize:15,padding:'0 24px'}, sm:{height:40,fontSize:14,padding:'0 18px'}, xs:{height:32,fontSize:12,padding:'0 12px',borderRadius:8} }[size]||{};
  const vt = { primary:{background:disabled?C.primary100:C.primary,color:'#fff'}, secondary:{background:C.primaryPale,color:C.primary,border:`1px solid ${C.primary100}`}, outline:{background:'transparent',color:C.primary,border:`1.5px solid ${C.primary}`}, ghost:{background:'transparent',color:C.t2,border:`1px solid ${C.border}`}, text:{background:'transparent',color:C.primary,height:'auto',padding:0} }[variant]||{};

// ── generateTags — AI 标签生成（根据正文内容提取 4-5 个关键词）──
function generateTags(text, extra = []) {
  if (!text || text === '未知') return extra.length > 0 ? extra.slice(0, 5) : [];
  const tags = new Set(extra);
  // 匹配年份
  const yearMatch = text.match(/\b(1[89]\d{2}|20\d{2})\b/g);
  if (yearMatch) tags.add(yearMatch[0]);
  // 匹配省市
  const locMatch = text.match(/(?:江苏|浙江|广东|四川|湖北|湖南|河南|山东|河北|福建|安徽|江西|陕西|辽宁|云南|贵州|广西|山西|吉林|黑龙江|甘肃|海南|台湾|北京|上海|天津|重庆|西藏|新疆|青海|宁夏|内蒙古)(?:\s*·\s*\S+)?/);
  if (locMatch) tags.add(locMatch[0]);
  // 匹配食材/调料（常见关键词）
  const foodKw = ['花椒','辣椒','姜','蒜','葱','酱油','醋','糖','盐','米酒','料酒','冰糖','五花肉','鸡肉','鸡蛋','豆腐','面粉','糯米','桂花','梅干菜','酸菜','腊肉','鱼','虾','蟹','年糕','饺子','包子','馒头','面条','米饭','汤圆','月饼','粽子','青团','红烧肉','火锅','烧烤','卤','蒸','炖','炒','炸','煎'];
  for (const kw of foodKw) {
    if (text.includes(kw)) tags.add(kw);
  }
  // 补到 4-5 个
  const arr = [...tags];
  if (arr.length < 4) {
    const fallbacks = ['家常味道', '记忆中的味道', '一家人', '温暖', '小时候', '老厨房', '年夜饭'];
    for (const f of fallbacks) {
      if (arr.length >= 5) break;
      if (!arr.includes(f)) arr.push(f);
    }
  }
  return arr.slice(0, 5);
}

      <BottomSheet open={sheet==='gray'} onClose={()=>setSheet(null)} title={grayPick?.name||'待讲'}>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        </div>

      <BottomSheet open={sheet==='forward'} onClose={()=>setSheet(null)} title="转给哪位家人？">
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>

              </div>

      <BottomSheet open={sheet==='hook'} onClose={()=>setSheet(null)} title="抛个钩子">
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <AppInput label="吃食名" placeholder="例：外婆的甜酒酿" value={hook.dish} onChange={v=>setHook(f=>({...f,dish:v}))}/>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>指定给谁讲（可多选）</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {['all',...members.filter(m=>m.status!=='placeholder').map(m=>m.name)].map(name=>{
                const sel=Array.isArray(hook.to)&&hook.to.includes(name);
                return <button key={name} onClick={()=>setHook(f=>{ const arr=Array.isArray(f.to)?f.to:[]; const next=arr.includes(name)?arr.filter(x=>x!==name):[...arr,name]; return {...f,to:next}; })} style={{ height:34, padding:'0 14px', borderRadius:9999, background:sel?C.primary:'transparent', border:`1.5px solid ${sel?C.primary:C.border}`, color:sel?'#fff':C.t1, fontSize:12.5, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:5 }}>{sel && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}{name==='all'?'全家':name}</button>;
              })}
            </div>
          </div>
          <Btn fullWidth size="lg" disabled={!hook.dish.trim()} onClick={async()=>{
            if (!activeFamId) return;
            const toNames = Array.isArray(hook.to) ? hook.to.filter(n=>n!=='all') : [];
            const toIds = members.filter(m=>toNames.includes(m.name)).map(m=>m.id);
            const r = await window.api.hook.create({ familyId: activeFamId, dish: hook.dish.trim(), targetMemberIds: toIds });
            setSheet(null);
            if (r.ok) { showToast(`已抛出钩子：${hook.dish}`); setHook({ dish:'', to:[] }); await loadData(activeFamId); }
            else showToast(r.error || '操作失败');
          }}>抛出</Btn>
        </div>
      </BottomSheet>
    </div>
  );
}

// P30 — Agent 对话页
// ══════════════════════════════════════════════════
function P30_Chat() {
  const { navigate, showToast } = useApp();
  const [sheet, setSheet] = React.useState(null);

  const ctx = React.useRef(window.__p30ctx || { type:'new' });
  React.useEffect(()=>{ window.__p30ctx = null; }, []);

  const initMsgs = () => {
    const c = ctx.current;
    if (c.type === 'anchor') return [
      { from:'agent', t:'好，和我讲讲「' + (c.name||'这道味道') + '」。给我一个画面 —— 哪一年、哪个地方，第一口下去什么味？' }
    ];
    if (c.type === 'hook') return [
      { from:'agent', t:'听说你家有人在等「' + (c.name||'这道味道') + '」的故事。你脑海里第一个冒出来的画面是什么？跟我说说？' }
    ];
    return [{ from:'agent', t:'我在呢。想讲哪种味道？可以就是一个模糊的画面，也可以是一句”那道菜我还记得”。' }];
  };
  const [msgs, setMsgs] = React.useState(initMsgs);
  const [input, setInput] = React.useState('');
  const [convId, setConvId] = React.useState(ctx.current.convId || null);
  const [familyId, setFamilyId] = React.useState(null);
  const [sending, setSending] = React.useState(false);
  const [ctaReady, setCtaReady] = React.useState(false);
  const [generating, setGenerating] = React.useState(false);
  const [attachedImg, setAttachedImg] = React.useState(null);
  const [imgUploading, setImgUploading] = React.useState(false);
  const fileRef = React.useRef();
  const agentCtx = React.useRef({});
  const scRef = React.useRef();
  React.useEffect(()=>{ if(scRef.current) scRef.current.scrollTop = scRef.current.scrollHeight; }, [msgs, sending]);

  // 挂载：解析家族 → 创建/加载对话 → 组装 agent context
  React.useEffect(()=>{ (async()=>{
    let fid = (window.__famCtx && window.__famCtx.id) || null;
    if (!fid) { const fams = await window.api.family.list(); fid = fams[0] && fams[0].id; }
    if (!fid) { showToast('请先加入或创建一个家族'); return; }
    setFamilyId(fid);
    const c = ctx.current;
    // 草稿带 convId → 加载历史 + state
    if (c.type === 'draft' && c.convId) {
      const conv = await window.api.conversation.get(c.convId);
      if (conv) {
        setConvId(conv.id);
        if (conv.messages && conv.messages.length) setMsgs(conv.messages.map(m => ({ from: m.role==='user'?'user':'agent', t: m.content })));
        agentCtx.current = await window.api.conversation.buildContext(fid, conv.entry_context||{});
        setCtaReady(!!(conv.state && conv.state.time_location_locked && (conv.state.conversation_turns||0) >= 5));
        return;
      }
    }
    // 新建对话（3 种初始状态：new=空白, anchor=带旧记忆, hook=受钩子邀请）
    const entry = (c.type === 'anchor' || c.type === 'hook') ? { food_name: c.name, entry_type: c.type } : {};
    const convType = c.type === 'anchor' ? 'anchor' : (c.type === 'hook' ? 'hook' : 'new');
    const res = await window.api.conversation.create({ familyId: fid, anchorId: c.anchorId||null, type: convType, title: c.name||'', entryContext: entry });
    if (res.ok) { setConvId(res.conversation.id); agentCtx.current = await window.api.conversation.buildContext(fid, entry); }
    else showToast('对话创建失败：'+(res.error||''));
  })(); /* eslint-disable-next-line */ }, []);

  async function send() {
    const v = input.trim(); if (!v || sending) return;
    if (!convId) { showToast('对话正在准备，请稍候…'); return; }
    setMsgs(m => [...m, { from:'user', t:v }]);
    setInput('');
    setSending(true);
    const res = await window.api.conversation.sendToAgent(convId, v, agentCtx.current);
    setSending(false);
    if (res && res.ok) {
      setMsgs(m => [...m, { from:'agent', t: res.reply }]);
      if (res.cta_ready) setCtaReady(true);
    } else {
      setMsgs(m => [...m, { from:'agent', t:'（我这会儿有点走神，没接住你这句，能再说一遍吗？）' }]);
    }
  }

  // 附加图片（§4.2 入口1：讲味道时配图，默认保留最新一次）→ 4:3 裁剪上传 chat 桶
  async function pickImg(e) {
    const file = e.target.files && e.target.files[0]; e.target.value = ''; if (!file) return;
    if (!familyId) { showToast('对话准备中，请稍候'); return; }
    setImgUploading(true);
    const r = await window.api.upload.imageCropped(file, 'chat', familyId);
    setImgUploading(false);
    if (r.ok) { setAttachedImg(r.url); showToast('图片已附加，整理成故事时会一起带上'); }
    else showToast('上传失败：'+(r.error||''));
  }

  // 整理成故事：调 generate-story → 跳 P31（带上附加的图片）
  async function toStory() {
    if (!convId || generating) return;
    setGenerating(true);
    const res = await window.api.ai.generateStory(convId, { family_name: agentCtx.current.family_name || '' });
    setGenerating(false);
    if (res && res.ok && res.story) {
      window.__p31ctx = { story: res.story, storyId: res.story_id, conversationId: convId, familyId, img: attachedImg || null, hookName: ctx.current.name || '', grayId: ctx.current.grayId || null };
      sessionStorage.setItem('p31ctx', JSON.stringify(window.__p31ctx));
      navigate('P31');
    } else {
      showToast('整理失败，再聊几句试试');
    }
  }

  // 退出（返回）：未点亮、未删除 → 标记为草稿（§2.3 草稿自动保存）
  async function leaveAsDraft() {
    if (convId) {
      try { await window.api.conversation.update(convId, { status:'draft', title: ctx.current.name||'' }); window.__statsDirty = Date.now(); } catch(e){ console.error('[P30] 保存草稿失败:', e); }
    }
    navigate('P10');
  }

  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', position:'relative', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>

      <div style={{ padding:'4px 12px 10px', display:'flex', alignItems:'center', gap:10, flexShrink:0, borderBottom:`1px solid ${C.border}`, background:'rgba(250,247,242,0.94)', backdropFilter:'blur(10px)' }}>
        <button onClick={leaveAsDraft} style={{ width:36, height:36, border:'none', background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke={C.t1} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div style={{ width:36, height:36, borderRadius:'50%', background:C.primaryPale, border:`1.5px solid ${C.primary100}`, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3a7 7 0 0 1 7 7v3l1.5 3-2 .5L18 19a6 6 0 0 1-6 4 6 6 0 0 1-6-4l-.5-2.5-2-.5L5 13v-3a7 7 0 0 1 7-7Z" stroke={C.primary} strokeWidth="1.6" strokeLinejoin="round"/><circle cx="9.5" cy="12" r="1" fill={C.primary}/><circle cx="14.5" cy="12" r="1" fill={C.primary}/></svg>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.t1, fontFamily:'"Noto Serif SC",serif' }}>记忆挖掘师</div>
          <div style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, color:C.primaryLight, marginTop:1 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'#7BAF9A' }}/>在听你讲
          </div>
        </div>
        <button onClick={()=>setSheet('menu')} style={{ width:36, height:36, border:'none', background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.5" fill={C.t2}/><circle cx="12" cy="12" r="1.5" fill={C.t2}/><circle cx="19" cy="12" r="1.5" fill={C.t2}/></svg>
        </button>
      </div>

      {ctx.current.type !== 'new' && (
        <div style={{ margin:'12px 18px 4px', flexShrink:0 }}>
          <div style={{ background:'#FFFDF8', border:`1px solid ${C.border}`, borderRadius:12, padding:'10px 12px', display:'flex', alignItems:'center', gap:10 }}>
            {ctx.current.img && <img src={ctx.current.img} alt="" style={{ width:36, height:36, objectFit:'contain', flexShrink:0 }}/>}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:12.5, fontWeight:600, color:C.t1, fontFamily:'"Noto Serif SC",serif' }}>正在讲：{ctx.current.name}</div>
              {ctx.current.by && <div style={{ fontSize:10.5, color:C.t3, marginTop:1 }}>{ctx.current.by}</div>}
              {ctx.current.type==='draft' && <div style={{ fontSize:10.5, color:C.t3, marginTop:1 }}>已有聊天记录</div>}
            </div>
            {ctx.current.type==='draft' && <span style={{ fontSize:10, background:C.primaryPale, color:C.primary, padding:'3px 8px', borderRadius:6, fontWeight:600 }}>草稿</span>}
          </div>
        </div>
      )}

      {/* 食物手绘底图 — 位于滚动区外，不撑高内容 */}
      <div style={{ position:'absolute', top:100, left:0, right:0, bottom:60, pointerEvents:'none', zIndex:0, overflow:'hidden' }}>
        {[
          { src:FOOD_POOL[0], top:20,  left:-18, size:130, rotate:-18, opacity:0.20 },
          { src:FOOD_POOL[2], top:160, right:-22, size:110, rotate:14,  opacity:0.20 },
          { src:FOOD_POOL[4], top:290, left:30,  size:90,  rotate:-8,  opacity:0.20 },
          { src:FOOD_POOL[6], top:420, right:10, size:120, rotate:20,  opacity:0.20 },
          { src:FOOD_POOL[1], top:550, left:-10, size:100, rotate:-22, opacity:0.20 },
        ].map((f,i)=>(
          <img key={i} src={f.src} alt="" style={{ position:'absolute', top:f.top, left:f.left, right:f.right, width:f.size, height:f.size, objectFit:'contain', transform:`rotate(${f.rotate}deg)`, opacity:f.opacity, filter:'saturate(0.4) brightness(0.85)', userSelect:'none' }}/>
        ))}
      </div>

      <div ref={scRef} style={{ flex:1, overflowY:'auto', padding:'10px 18px 14px', display:'flex', flexDirection:'column', gap:12, position:'relative', zIndex:1 }}>
        {msgs.filter(m=>!m.cta).map((m,i)=> (
          <div key={i} style={{ display:'flex', flexDirection:m.from==='user'?'row-reverse':'row', gap:8, alignItems:'flex-end' }}>
            {m.from==='agent' && <div style={{ width:26, height:26, borderRadius:'50%', background:C.primaryPale, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3a7 7 0 0 1 7 7v3l1.5 3-2 .5L18 19a6 6 0 0 1-6 4 6 6 0 0 1-6-4l-.5-2.5-2-.5L5 13v-3a7 7 0 0 1 7-7Z" stroke={C.primary} strokeWidth="1.6" strokeLinejoin="round"/></svg></div>}
            <div style={{ maxWidth:'78%', padding:'10px 14px', borderRadius:m.from==='user'?'16px 16px 4px 16px':'4px 16px 16px 16px', background:m.from==='user'?C.primary:'#fff', color:m.from==='user'?'#fff':C.t1, fontSize:14, lineHeight:1.7, boxShadow:'0 1px 3px rgba(0,0,0,0.05)', border:m.from==='user'?'none':`1px solid ${C.border}`, whiteSpace:'pre-wrap' }}>{m.t}</div>
          </div>
        ))}
        {sending && (
          <div style={{ display:'flex', gap:8, alignItems:'flex-end' }}>
            <div style={{ width:26, height:26, borderRadius:'50%', background:C.primaryPale, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3a7 7 0 0 1 7 7v3l1.5 3-2 .5L18 19a6 6 0 0 1-6 4 6 6 0 0 1-6-4l-.5-2.5-2-.5L5 13v-3a7 7 0 0 1 7-7Z" stroke={C.primary} strokeWidth="1.6" strokeLinejoin="round"/></svg></div>
            <div style={{ padding:'10px 14px', borderRadius:'4px 16px 16px 16px', background:'#fff', color:C.t3, fontSize:14, border:`1px solid ${C.border}` }}>在想怎么接你这句…</div>
          </div>
        )}
      </div>

      <div style={{ padding:'8px 18px 4px', flexShrink:0 }}>
        <button disabled={generating} onClick={toStory} style={{ width:'100%', background:C.primary, color:'#fff', border:'none', borderRadius:9999, padding:'12px 18px', fontSize:14, fontWeight:600, cursor:generating?'default':'pointer', opacity:generating?0.7:1, fontFamily:'inherit', boxShadow:'0 4px 14px rgba(40,91,78,0.28)', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 4h10l6 6v10a2 2 0 0 1-2 2H4V4Z" stroke="#fff" strokeWidth="1.8" strokeLinejoin="round"/></svg>
          {generating ? '正在整理…' : '整理成一段故事'}
        </button>
      </div>

      {attachedImg && (
        <div style={{ padding:'0 16px 6px', flexShrink:0, display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ position:'relative', width:54, height:40, borderRadius:8, overflow:'hidden', border:`1px solid ${C.border}` }}>
            <img src={attachedImg} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
            <button onClick={()=>setAttachedImg(null)} style={{ position:'absolute', top:1, right:1, width:16, height:16, borderRadius:'50%', background:'rgba(0,0,0,0.55)', border:'none', cursor:'pointer', color:'#fff', fontSize:11, lineHeight:'16px', padding:0 }}>×</button>
          </div>
          <span style={{ fontSize:11.5, color:C.t3 }}>已附图（整理成故事时带上）</span>
        </div>
      )}
      <div style={{ padding:'10px 14px calc(34px + env(safe-area-inset-bottom))', background:'#FFFDF8', borderTop:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
        <input ref={fileRef} type="file" accept="image/*" style={{ display:'none' }} onChange={pickImg}/>
        <button onClick={()=>{ if(!imgUploading) fileRef.current && fileRef.current.click(); }} style={{ width:38, height:38, borderRadius:'50%', border:`1px solid ${C.border}`, background:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          {imgUploading
            ? <span style={{ fontSize:10, color:C.t3 }}>…</span>
            : <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke={C.t2} strokeWidth="1.8"/><circle cx="9" cy="11" r="1.8" fill={C.t2}/><path d="m3 17 5-4 4 3 4-5 5 4" stroke={C.t2} strokeWidth="1.8" strokeLinejoin="round"/></svg>}
        </button>
        <div style={{ flex:1, background:'#fff', border:`1px solid ${C.border}`, borderRadius:9999, padding:'0 14px', display:'flex', alignItems:'center', height:40 }}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter') send(); }} placeholder="说说看…" style={{ flex:1, border:'none', outline:'none', background:'transparent', fontSize:14, color:C.t1, fontFamily:'inherit' }}/>
        </div>
        {input.trim() ? (
          <button onClick={send} style={{ width:46, height:38, borderRadius:9999, background:C.primary, border:'none', cursor:'pointer', color:'#fff', fontSize:13, fontWeight:600, fontFamily:'inherit', flexShrink:0 }}>发送</button>
        ) : (
          <button onClick={()=>showToast('按住录音')} style={{ width:38, height:38, borderRadius:'50%', border:`1px solid ${C.border}`, background:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="13" rx="3" stroke={C.t2} strokeWidth="1.8"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke={C.t2} strokeWidth="1.8" strokeLinecap="round"/></svg>
          </button>
        )}
      </div>

      <BottomSheet open={sheet==='menu'} onClose={()=>setSheet(null)} title="更多">
        <div style={{ display:'flex', flexDirection:'column', gap:0, margin:'0 -4px' }}>
          <button onClick={()=>setSheet('switch')} style={{ padding:'16px 20px', background:'transparent', border:'none', borderRadius:12, textAlign:'left', cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:14 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 8h12l-1 11a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 8Z" stroke={C.primary} strokeWidth="1.7"/><path d="M9 8V5a3 3 0 1 1 6 0v3" stroke={C.primary} strokeWidth="1.7"/></svg>
            <span style={{ fontSize:15, color:C.t1, fontWeight:500 }}>切换 / 新建味道</span>
          </button>
          <div style={{ height:1, background:C.border, margin:'0 20px' }}/>
          <button onClick={()=>setSheet('del')} style={{ padding:'16px 20px', background:'transparent', border:'none', borderRadius:12, textAlign:'left', cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:14 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke={C.red} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <span style={{ fontSize:15, color:C.red, fontWeight:500 }}>删除对话记录</span>
          </button>
        </div>
      </BottomSheet>

      <BottomSheet open={sheet==='switch'} onClose={()=>setSheet(null)} title="切换 / 新建味道">
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {/* 新建 */}
          <button onClick={()=>{ setSheet(null); window.__p30ctx={ type:'new', name:'', msgs:[] }; navigate('P30'); }} style={{ padding:'14px 16px', background:C.primaryPale, border:`1.5px solid ${C.primary100}`, borderRadius:14, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:12, textAlign:'left' }}>
            <div style={{ width:36, height:36, borderRadius:'50%', background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.2" strokeLinecap="round"/></svg>
            </div>
            <div>
              <div style={{ fontSize:14, fontWeight:700, color:C.primaryDark }}>新建味道对话</div>
              <div style={{ fontSize:12, color:C.t3, marginTop:2 }}>开启全新一道味道的故事</div>
            </div>
          </button>
          <div style={{ fontSize:11, color:C.t3, letterSpacing:1.5, fontWeight:700, padding:'10px 4px 4px' }}>味道桌上的味道</div>
          {ANCHORS_LIT.map(a=>(
            <button key={a.id} onClick={()=>{ setSheet(null); window.__p30ctx={ type:'anchor', name:a.name, tag:'味道桌', msgs:[{ from:'agent', t:`好，今天继续讲「${a.name}」。上次聊到哪了？` }] }; navigate('P30'); }} style={{ padding:'12px 14px', background:'#FFFDF8', border:`1px solid ${C.border}`, borderRadius:12, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:12, textAlign:'left' }}>
              <div style={{ width:58, height:44, borderRadius:8, overflow:'hidden', flexShrink:0 }}>
                <img src={a.img} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:14, fontWeight:600, color:C.t1, fontFamily:'"Noto Serif SC",serif' }}>{a.name}</div>
                <div style={{ fontSize:11.5, color:C.t3, marginTop:2 }}>{a.by} · {a.era}</div>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke={C.t3} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          ))}
        </div>
      </BottomSheet>

      <BottomSheet open={sheet==='del'} onClose={()=>setSheet(null)} title="删除对话记录">
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ background:'#FEF0ED', border:`1px solid #F4D6C5`, borderRadius:12, padding:'14px 16px', fontSize:13, color:C.warn, lineHeight:1.85 }}>删除后本次对话内容将<strong>无法找回</strong>，已整理成故事的记忆不受影响。</div>
          <div style={{ display:'flex', gap:10 }}>
            <Btn fullWidth size="lg" onClick={async()=>{ setSheet(null); if(convId){ try{ await window.api.conversation.remove(convId); window.__statsDirty = Date.now(); }catch(e){} } showToast('对话记录已删除'); navigate('P10'); }} style={{ background:C.red }}>确认删除</Btn>
            <Btn variant="outline" fullWidth onClick={()=>setSheet(null)}>取消</Btn>
          </div>
        </div>
      </BottomSheet>

    </div>
  );
}
// ══════════════════════════════════════════════════
function P31_Story() {
  const { navigate, showToast } = useApp();
  const [gen, setGen] = React.useState(false);
  const [supp, setSupp] = React.useState('');
  const [isCapsule, setIsCapsule] = React.useState(false);
  const [capForm, setCapForm] = React.useState({ name:'', whenY:'2030', whenM:'1', whenD:'1', to:[] });
  const [busy, setBusy] = React.useState(false);

  // ── 从 P30 上下文读取真实故事（§10.2 结构）+ §2.4 兜底默认值 ──
  const p30ctx = React.useRef(JSON.parse(sessionStorage.getItem('p31ctx') || '{}')).current;
  const [story, setStory] = React.useState(p30ctx.story || {});
  const loc = (story.scene && story.scene.location) || {};
  const storyText = React.useMemo(()=>{
    const parts = [];
    if (story.emotion && story.emotion.core_feeling) parts.push(story.emotion.core_feeling);
    ((story.emotion && story.emotion.stories) || []).forEach(s => { if (s.detail) parts.push(s.detail); else if (s.summary) parts.push(s.summary); });
    if (story.food && story.food.taste_memory) parts.push(story.food.taste_memory);
    if (story.emotion && story.emotion.personal_meaning) parts.push(story.emotion.personal_meaning);
    return parts.filter(Boolean).join('\n\n');
  }, [story]);
  const [tags, setTags] = React.useState([]);
  const [byName, setByName] = React.useState('');
  const [members, setMembers] = React.useState([]);

  const storyData = {
    name: (story.food && story.food.name) || p30ctx.hookName || '未知',
    img: p30ctx.img || (FOOD_POOL && FOOD_POOL[0]) || MOCK_FOOD_IMG,
    by: byName,
    era: (story.scene && story.scene.era) || '1900',
    location: loc.city || '未知',
    province: loc.province || '',
    text: storyText || '未知',
  };

  // 挂载：取我的成员名（署名）+ 家族成员（送给谁全选联动）+ AI 标签
  React.useEffect(()=>{ (async()=>{
    const fid = p30ctx.familyId;
    if (fid) {
      const g = await window.api.family.graph(fid);
      const me = (await window.sb.auth.getUser()).data.user;
      const myNode = (g.members||[]).find(m => m.user_id === (me && me.id));
      if (myNode) setByName(myNode.name);
      setMembers(g.members || []);
    }
    if (storyText) { const r = await window.api.ai.generateTags(storyText); if (r && r.ok && r.tags && r.tags.length) setTags(r.tags); }
  })(); /* eslint-disable-next-line */ }, []);

  // 重写一版：重新调 generate-story
  async function regenerate() {
    if (!p30ctx.conversationId) { showToast('缺少对话上下文'); return; }
    setGen(true);
    const r = await window.api.ai.generateStory(p30ctx.conversationId, { family_name: '' });
    setGen(false);
    if (r && r.ok && r.story) { setStory(r.story); p30ctx.story = r.story; p30ctx.storyId = r.story_id; }
    else showToast('重写失败，请稍后再试');
  }

  // 点亮：建真实 anchor(lit) + 灰锚点建议落库
  async function lightUp() {
    if (busy) return;
    const fid = p30ctx.familyId;
    if (!fid) { showToast('缺少家族上下文'); return; }
    setBusy(true);
    const me = (await window.sb.auth.getUser()).data.user;
    const byMember = (members.find(m => m.user_id === (me && me.id)) || {}).id || null;
    const res = await window.api.anchor.create({
      familyId: fid, name: storyData.name, byMember,
      era: storyData.era, city: storyData.location !== '未知' ? storyData.location : null, province: storyData.province || null,

      imgUrl: p30ctx.img || (FOOD_POOL && FOOD_POOL[0]) || null,

    setBusy(false);

    showToast('已封存进时间胶囊');
    setTimeout(()=>navigate('P62'), 800);

                  </div>
                </div>
                <div>

                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>

      {!gen && (

          </Btn>
        </div>
      )}
    </div>
  );
}
