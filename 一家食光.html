  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #E5E5E0; }
  body { -webkit-font-smoothing: antialiased; }
  #root { width: 100vw; height: 100dvh; display: flex; }

  /* 页面推入动画 */
  @keyframes slideInRight {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
  .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.32,0.72,0,1) both; }
  .slide-in-left  { animation: slideInLeft  0.3s cubic-bezier(0.32,0.72,0,1) both; }

  @keyframes floatFood {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%     { transform: translateY(-10px) rotate(3deg); }
  }
  .float-food { animation: floatFood 3.2s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

  /* input placeholder 颜色 */
  input::placeholder { color: #B8B0A8; }
</style>

function Btn({ children, onClick, variant='primary', size='md', disabled, fullWidth, xstyle }) {

function AppInput({ label, placeholder, value, onChange, type='text', error, rightEl, hint, autoComplete }) {
  const [focused, setFocused] = React.useState(false);
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>

          style={{ flex:1, height:50, padding:rightEl?'0 48px 0 16px':'0 16px', background:C.inputBg, border:`1.5px solid ${error?C.red:focused?C.primary:C.border}`, borderRadius:12, fontSize:15, color:C.t1, fontFamily:'inherit', outline:'none', transition:'border-color 0.15s' }}

      {hint && !error && <div style={{ fontSize:12, color:C.t3, lineHeight:1.5 }}>{hint}</div>}
    </div>
  );
}

  return (

}

// ── generateTags — AI 标签生成（根据正文内容提取 4-5 个关键词）──
function generateTags(text, extra = []) {
  if (!text || text === '未知') return extra.length > 0 ? extra.slice(0, 5) : [];
  const tags = new Set(extra);
  // 匹配年份
  const yearMatch = text.match(/\b(1[89]\d{2}|20\d{2})\b/g);
  if (yearMatch) tags.add(yearMatch[0]);
  // 匹配省市
  const locMatch = text.match(/(?:江苏|浙江|广东|四川|湖北|湖南|河南|山东|河北|福建|安徽|江西|陕西|辽宁|云南|贵州|广西|山西|吉林|黑龙江|甘肃|海南|台湾|北京|上海|天津|重庆|西藏|新疆|青海|宁夏|内蒙古)(?:\s*·\s*\S+)?/);
  if (locMatch) tags.add(locMatch[0]);
  // 匹配食材/调料（常见关键词）
  const foodKw = ['花椒','辣椒','姜','蒜','葱','酱油','醋','糖','盐','米酒','料酒','冰糖','五花肉','鸡肉','鸡蛋','豆腐','面粉','糯米','桂花','梅干菜','酸菜','腊肉','鱼','虾','蟹','年糕','饺子','包子','馒头','面条','米饭','汤圆','月饼','粽子','青团','红烧肉','火锅','烧烤','卤','蒸','炖','炒','炸','煎'];
  for (const kw of foodKw) {
    if (text.includes(kw)) tags.add(kw);
  }
  // 补到 4-5 个
  const arr = [...tags];
  if (arr.length < 4) {
    const fallbacks = ['家常味道', '记忆中的味道', '一家人', '温暖', '小时候', '老厨房', '年夜饭'];
    for (const f of fallbacks) {
      if (arr.length >= 5) break;
      if (!arr.includes(f)) arr.push(f);
    }
  }
  return arr.slice(0, 5);
}

function P0_Splash() {
  const { navigate } = useApp();
  const [progress, setProgress] = React.useState(0);
  const [imgLoaded, setImgLoaded] = React.useState(false);
  React.useEffect(() => {
    if (!imgLoaded) return;
    const start = Date.now(), dur = 2600;
    const id = setInterval(() => {
      const p = Math.min((Date.now()-start)/dur, 1);
      setProgress(p);
      if (p >= 1) { clearInterval(id); setTimeout(()=>navigate('P1'), 180); }
    }, 40);
    return () => clearInterval(id);

// P1 — 登录页
// ══════════════════════════════════════════════════
function P1_Login() {
  const { navigate, showToast } = useApp();
  const [form, setForm] = React.useState({ username:'', password:'' });
  const [showPwd, setShowPwd] = React.useState(false);
  const [errors, setErrors] = React.useState({});
  const [sheet, setSheet] = React.useState(null);
  const [reg, setReg] = React.useState({ username:'', password:'', confirm:'', nickname:'', secA1:'', secA2:'', agreed:false });
  const [regErr, setRegErr] = React.useState({});
  const [fgt, setFgt] = React.useState({ username:'', step:1, a1:'', newPwd:'', confirmPwd:'' });
  function handleLogin() {
    const e = {};
    if (!form.username.trim()) e.username='请输入用户名';
    if (!form.password) e.password='请输入密码';
    if (Object.keys(e).length) { setErrors(e); return; }
    navigate('P2');
  }
  function handleRegister() {
    const e = {};
    if (!reg.username.trim()) e.username='请输入用户名';
    if (reg.password.length < 6) e.password='密码至少 6 位';
    if (reg.password !== reg.confirm) e.confirm='两次密码不一致';
    if (!reg.nickname.trim()) e.nickname='请输入昵称';
    if (!reg.secA1.trim()) e.secA1='请填写答案';
    if (!reg.agreed) e.agreed='请阅读并同意协议';
    if (Object.keys(e).length) { setRegErr(e); return; }
    setSheet(null); showToast('注册成功，欢迎加入一家食光！');
    setTimeout(()=>navigate('P2'), 1100);
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', position:'relative', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', padding:'8px 28px 36px', overflow:'hidden' }}>
        <div style={{ textAlign:'center', padding:'12px 0 28px' }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:10 }}>
            <img src="uploads/微信图片_2026-06-11_094402_462.png" alt="" className="float-food"
              style={{ width:110, height:110, objectFit:'contain' }}/>
          </div>
          <div style={{ fontFamily:'"ZCOOL XiaoWei",serif', fontSize:28, color:C.primaryDark, letterSpacing:6, marginBottom:5 }}>一家食光</div>
          <div style={{ fontSize:12, color:C.t3, letterSpacing:2.5 }}>食有来处，家有回声</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <AppInput placeholder="用户名" value={form.username} onChange={v=>{ setForm(f=>({...f,username:v})); setErrors(e=>({...e,username:''})); }} error={errors.username} autoComplete="username"/>
          <AppInput placeholder="密码" type={showPwd?'text':'password'} value={form.password} onChange={v=>{ setForm(f=>({...f,password:v})); setErrors(e=>({...e,password:''})); }} error={errors.password} autoComplete="current-password"
            rightEl={<button onClick={()=>setShowPwd(s=>!s)} style={{ background:'none', border:'none', cursor:'pointer', color:C.t3, fontSize:13, padding:4 }}>{showPwd?'隐藏':'显示'}</button>}
          />
          <div style={{ textAlign:'right', marginTop:-4 }}>
            <button onClick={()=>setSheet('forgot')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:C.t3, padding:0 }}>忘记密码？</button>
          </div>
          <Btn onClick={handleLogin} fullWidth size="lg">登 录</Btn>
          <div style={{ textAlign:'center', display:'flex', alignItems:'center', justifyContent:'center', gap:5, marginTop:2 }}>
            <span style={{ fontSize:14, color:C.t3 }}>还没有账号？</span>
            <button onClick={()=>navigate('P_Register')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:14, color:C.primary, fontWeight:700, padding:0 }}>立即注册</button>
          </div>
        </div>
      </div>
      <BottomSheet open={sheet==='register'} onClose={()=>setSheet(null)} title="创建新账号">
        <div style={{ display:'flex', flexDirection:'column', gap:14, paddingBottom:24 }}>

          <AppInput label="用户名" placeholder="字母、数字、下划线" value={reg.username} onChange={v=>{ setReg(r=>({...r,username:v})); setRegErr(e=>({...e,username:''})); }} error={regErr.username}/>
          <AppInput label="密码" placeholder="至少 6 位" type="password" value={reg.password} onChange={v=>{ setReg(r=>({...r,password:v})); setRegErr(e=>({...e,password:''})); }} error={regErr.password}/>
          <AppInput label="确认密码" placeholder="再输一次" type="password" value={reg.confirm} onChange={v=>{ setReg(r=>({...r,confirm:v})); setRegErr(e=>({...e,confirm:''})); }} error={regErr.confirm}/>
          <AppInput label="昵称" placeholder="家人认识你的称呼" value={reg.nickname} onChange={v=>{ setReg(r=>({...r,nickname:v})); setRegErr(e=>({...e,nickname:''})); }} error={regErr.nickname}/>
          <div style={{ background:'#F5F0E8', borderRadius:12, padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.t2 }}>密保问题</div>
            <div>
              <div style={{ fontSize:12, color:C.t2, marginBottom:5 }}>你小时候最爱吃的一道菜叫什么？</div>
              <input value={reg.secA1} onChange={e=>{ setReg(r=>({...r,secA1:e.target.value})); setRegErr(x=>({...x,secA1:''})); }} placeholder="请填写答案并牢记" style={{ width:'100%', height:42, padding:'0 12px', background:'#FFFDF8', border:`1px solid ${regErr.secA1?C.red:C.border}`, borderRadius:8, fontSize:14, color:C.t1, fontFamily:'inherit', outline:'none' }}/>
              {regErr.secA1 && <div style={{ fontSize:11, color:C.red, marginTop:3 }}>{regErr.secA1}</div>}
            </div>
          </div>
          <div style={{ display:'flex', gap:10, alignItems:'flex-start' }}>
            <div onClick={()=>setReg(r=>({...r,agreed:!r.agreed}))} style={{ width:20, height:20, borderRadius:5, flexShrink:0, marginTop:1, cursor:'pointer', background:reg.agreed?C.primary:'transparent', border:`2px solid ${reg.agreed?C.primary:C.t3}`, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s' }}>
              {reg.agreed && <span style={{ color:'#fff', fontSize:11, fontWeight:800 }}>✓</span>}
            </div>
            <span style={{ fontSize:13, color:C.t2, lineHeight:1.65 }}>已阅读并同意<span style={{ color:C.primary, fontWeight:600 }}>《用户协议》</span>与<span style={{ color:C.primary, fontWeight:600 }}>《隐私政策》</span></span>
          </div>
          {regErr.agreed && <div style={{ fontSize:12, color:C.red, marginTop:-6 }}>{regErr.agreed}</div>}
          <Btn onClick={handleRegister} fullWidth size="lg">完成注册</Btn>
        </div>
      </BottomSheet>
      <BottomSheet open={sheet==='forgot'} onClose={()=>{ setSheet(null); setFgt({username:'',step:1,a1:'',newPwd:'',confirmPwd:''}); }} title={fgt.step===1?'找回密码':fgt.step===2?'验证身份':'设置新密码'}>
        <div style={{ display:'flex', flexDirection:'column', gap:14, paddingBottom:24 }}>
          {/* 步骤指示器 */}
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            {[1,2,3].map((s,i)=>(
              <React.Fragment key={s}>
                <div style={{ width:24, height:24, borderRadius:'50%', background:fgt.step>=s?C.primary:'#E8E2D6', color:fgt.step>=s?'#fff':C.t3, fontSize:11, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s' }}>{s}</div>
                {i<2 && <div style={{ flex:1, height:2, background:fgt.step>s?C.primary:'#E8E2D6', borderRadius:2, transition:'all 0.2s' }}/>}
              </React.Fragment>
            ))}
          </div>
          {fgt.step===1 && (<>
            <AppInput label="用户名" placeholder="输入你的用户名" value={fgt.username} onChange={v=>setFgt(f=>({...f,username:v}))}/>
            <Btn onClick={()=>fgt.username.trim()&&setFgt(f=>({...f,step:2}))} disabled={!fgt.username.trim()} fullWidth>下一步</Btn>
          </>)}
          {fgt.step===3 && (<>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6, marginBottom:4 }}>
              <div style={{ width:48, height:48, borderRadius:'50%', background:C.primaryPale, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2a5 5 0 0 1 5 5v2H6V7a5 5 0 0 1 5-5Z" stroke={C.primary} strokeWidth="1.5"/><rect x="3" y="9" width="16" height="11" rx="3" stroke={C.primary} strokeWidth="1.5"/><circle cx="11" cy="14.5" r="1.5" fill={C.primary}/></svg>
              </div>
              <div style={{ fontSize:15, fontWeight:700, color:C.t1 }}>设置新密码</div>
              <div style={{ fontSize:12, color:C.t3 }}>为账号「{fgt.username}」设置新密码</div>
            </div>
            <AppInput label="新密码" placeholder="至少 6 位" type="password"
              value={fgt.newPwd} onChange={v=>setFgt(f=>({...f,newPwd:v}))}
            />
            <AppInput label="确认新密码" placeholder="再输一次" type="password"
              value={fgt.confirmPwd} onChange={v=>setFgt(f=>({...f,confirmPwd:v}))}
              error={fgt.confirmPwd&&fgt.newPwd!==fgt.confirmPwd?'两次密码不一致':''}
            />
            <Btn
              onClick={()=>{
                if(fgt.newPwd.length<6||fgt.newPwd!==fgt.confirmPwd) return;
                setSheet(null);
                setFgt({username:'',step:1,a1:'',newPwd:'',confirmPwd:''});
                showToast('密码已更新，请重新登录');
              }}
              disabled={fgt.newPwd.length<6||fgt.newPwd!==fgt.confirmPwd}
              fullWidth size="lg"
            >确认修改</Btn>
          </>)}
          {fgt.step===2 && (<>
            <div style={{ fontSize:14, color:C.t2, lineHeight:1.8 }}>请回答你设置的密保问题</div>
            <div style={{ background:'#F5F0E8', borderRadius:10, padding:'12px 14px', display:'flex', flexDirection:'column', gap:8 }}>
              <div style={{ fontSize:12, color:C.t2, fontWeight:500 }}>你小时候最爱吃的一道菜叫什么？</div>
              <AppInput placeholder="请输入答案" value={fgt.a1} onChange={v=>setFgt(f=>({...f,a1:v}))}/>
            </div>

            <Btn onClick={()=>{ if(fgt.a1.trim()){ showToast('验证成功'); setTimeout(()=>setFgt(f=>({...f,step:3})),600); } }} disabled={!fgt.a1.trim()} fullWidth>验证</Btn>
          </>)}
        </div>
      </BottomSheet>
    </div>
  );
}

// P30 — Agent 对话页
// ══════════════════════════════════════════════════
function P30_Chat() {
  const { navigate, showToast } = useApp();
  const [sheet, setSheet] = React.useState(null);

  const ctx = React.useRef(window.__p30ctx || { type:'new' });
  React.useEffect(()=>{ window.__p30ctx = null; }, []);

  const initMsgs = () => {
    const c = ctx.current;
    if (c.type === 'draft') return c.msgs || [];
    if (c.type === 'anchor') return [
      { from:'agent', t:'好，和我讲讲「' + c.name + '」。给我一个画面 —— 哪一年、哪个地方，第一口下去什么味？' }
    ];
    return [{ from:'agent', t:'我在呢。想讲哪种味道？可以就是一个模糊的画面，也可以是一句“那道菜我还记得”。' }];
  };
  const [msgs, setMsgs] = React.useState(initMsgs);
  const [input, setInput] = React.useState('');
  const scRef = React.useRef();
  React.useEffect(()=>{ if(scRef.current) scRef.current.scrollTop = scRef.current.scrollHeight; }, [msgs]);

  function send() {
    const v = input.trim(); if (!v) return;
    setMsgs(m => [...m, { from:'user', t:v }]);
    setInput('');
    setTimeout(()=>{
      setMsgs(m => [...m, { from:'agent', t:'好，我记下了。你愿意现在让我把这些碎片整理成一段故事吗？' }, { from:'agent', cta:true }]);
    }, 700);
  }

  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', position:'relative', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>

      <BottomSheet open={sheet==='switch'} onClose={()=>setSheet(null)} title="切换 / 新建味道">
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {/* 新建 */}
          <button onClick={()=>{ setSheet(null); window.__p30ctx={ type:'new', name:'', msgs:[] }; navigate('P30'); }} style={{ padding:'14px 16px', background:C.primaryPale, border:`1.5px solid ${C.primary100}`, borderRadius:14, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:12, textAlign:'left' }}>
            <div style={{ width:36, height:36, borderRadius:'50%', background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.2" strokeLinecap="round"/></svg>
            </div>
            <div>
              <div style={{ fontSize:14, fontWeight:700, color:C.primaryDark }}>新建味道对话</div>
              <div style={{ fontSize:12, color:C.t3, marginTop:2 }}>开启全新一道味道的故事</div>
            </div>
          </button>
          <div style={{ fontSize:11, color:C.t3, letterSpacing:1.5, fontWeight:700, padding:'10px 4px 4px' }}>味道桌上的味道</div>
          {ANCHORS_LIT.map(a=>(
            <button key={a.id} onClick={()=>{ setSheet(null); window.__p30ctx={ type:'anchor', name:a.name, tag:'味道桌', msgs:[{ from:'agent', t:`好，今天继续讲「${a.name}」。上次聊到哪了？` }] }; navigate('P30'); }} style={{ padding:'12px 14px', background:'#FFFDF8', border:`1px solid ${C.border}`, borderRadius:12, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:12, textAlign:'left' }}>
              <div style={{ width:58, height:44, borderRadius:8, overflow:'hidden', flexShrink:0 }}>

            </button>

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ background:'#FEF0ED', border:`1px solid #F4D6C5`, borderRadius:12, padding:'14px 16px', fontSize:13, color:C.warn, lineHeight:1.85 }}>删除后本次对话内容将<strong>无法找回</strong>，已整理成故事的记忆不受影响。</div>

          <Btn variant="outline" fullWidth onClick={()=>setSheet(null)}>取消</Btn>

function P31_Story() {
  const { navigate, showToast } = useApp();
  const [gen, setGen] = React.useState(true);
  const [supp, setSupp] = React.useState('');
  const [isCapsule, setIsCapsule] = React.useState(false);
  const [capForm, setCapForm] = React.useState({ name:'', whenY:'2030', whenM:'1', whenD:'1', to:['全家'] });

  // ── 从 P30 上下文读取数据，应用兜底默认值 ──
  const p30ctx = JSON.parse(sessionStorage.getItem('p31ctx') || sessionStorage.getItem('p30ctx') || '{}');
  const storyData = {
    name: (p30ctx.name || '') || '未知',
    img: (p30ctx.img || '') || MOCK_FOOD_IMG,
    by: (p30ctx.by || ''),
    era: (p30ctx.era || '') || '1900',
    location: (p30ctx.location || '') || '未知',
    text: (p30ctx.text || '') || '未知',
    tags: (p30ctx.tags && p30ctx.tags.length > 0) ? p30ctx.tags : generateTags(p30ctx.text || ''),
  };

  React.useEffect(()=>{ const t=setTimeout(()=>setGen(false), 2200); return ()=>clearTimeout(t); }, []);

  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', position:'relative', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="整理成一段故事" onBack={()=>navigate('P30')}/>

      {gen ? (
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:24, padding:'0 32px' }}>
          <img src={FOOD_POOL[5]} alt="" style={{ width:110, height:110, objectFit:'contain', animation:'spin 3.6s linear infinite' }}/>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:16, fontWeight:700, color:C.t1, fontFamily:'"Noto Serif SC",serif', letterSpacing:2 }}>正在把碎片串起来…</div>
            <div style={{ fontSize:12, color:C.t3, marginTop:10, lineHeight:1.8 }}>分析对话 · 提取画面 · 写成故事</div>
          </div>
          <div style={{ width:200, height:3, background:C.border, borderRadius:9999, overflow:'hidden' }}>
            <div style={{ width:'68%', height:'100%', background:C.primary }}/>
          </div>
        </div>
      ) : (
        <div style={{ flex:1, overflowY:'auto', padding:'0 22px 18px' }}>
          <div style={{ background:'#FFFDF8', borderRadius:18, padding:'18px 18px 20px', border:`1px solid ${C.border}`, marginBottom:14 }}>
            <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:14 }}>
              <img src={MOCK_FOOD_IMG} alt="" style={{ width:96, height:72, objectFit:'cover', borderRadius:10, flexShrink:0 }}/>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11, color:C.t3, letterSpacing:1.5, fontWeight:600, marginBottom:4 }}>一种味道 · 一段记忆</div>
                <div style={{ fontSize:22, fontWeight:800, color:C.t1, fontFamily:'"Noto Serif SC",serif', lineHeight:1.3 }}>{storyData.name}</div>
                <div style={{ fontSize:11.5, color:C.t3, marginTop:5 }}>{[storyData.by, storyData.era, storyData.location].filter(Boolean).join(' · ')}</div>
              </div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:12, fontSize:14, color:C.t1, lineHeight:1.95, fontFamily:'"Noto Serif SC",serif' }}>
              <p style={{ margin:0 }}>{storyData.text}</p>
            </div>
            {storyData.tags.length > 0 && (
            <div style={{ marginTop:14, display:'flex', flexWrap:'wrap', gap:6 }}>
              {storyData.tags.map(tag=>(
                <span key={tag} style={{ fontSize:11, background:C.primaryPale, color:C.primary, padding:'3px 9px', borderRadius:9999, fontWeight:500 }}>#{tag}</span>
              ))}
            </div>
            )}
          </div>

          <div style={{ background:'#FFFDF8', borderRadius:14, padding:'14px 16px', border:`1px solid ${C.border}` }}>
            <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>还有什么想补的？</div>
            <textarea value={supp} onChange={e=>setSupp(e.target.value)} placeholder="例如：那天外公也在，他坐在小板凳上抽烟…" rows={3} style={{ width:'100%', padding:10, border:`1px solid ${C.border}`, borderRadius:10, fontSize:13, color:C.t1, background:'#fff', fontFamily:'inherit', outline:'none', resize:'none', boxSizing:'border-box', lineHeight:1.6 }}/>
            <div style={{ display:'flex', gap:8, marginTop:10 }}>
              <Btn variant="outline" onClick={()=>{ setGen(true); setTimeout(()=>setGen(false),1600); }} xstyle={{flex:1}}>重写一版</Btn>
              <Btn variant="outline" onClick={()=>navigate('P30')} xstyle={{flex:1}}>再聊聊</Btn>
            </div>
          </div>

          {/* 设定为时间胶囊 */}
          <div style={{ marginTop:14, background:'#FFFDF8', borderRadius:14, padding:'14px 16px', border:'1px solid '+C.border }}>
            <button onClick={()=>setIsCapsule(v=>!v)} style={{ width:'100%', display:'flex', alignItems:'center', gap:12, background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', textAlign:'left', padding:0 }}>
              <div style={{ width:22, height:22, borderRadius:6, border:'1.5px solid '+(isCapsule?C.primary:C.border), background:isCapsule?C.primary:'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'all 0.15s' }}>
                {isCapsule && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:600, color:C.t1 }}>设定为时间胶囊</div>
                <div style={{ fontSize:11.5, color:C.t3, marginTop:2 }}>封存故事，在未来某天送达家人</div>
              </div>
            </button>
            {isCapsule && (
              <div style={{ marginTop:14, display:'flex', flexDirection:'column', gap:12 }}>
                <AppInput label="胶囊名字" placeholder="例：给女儿的老味道" value={capForm.name} onChange={v=>setCapForm(f=>({...f,name:v}))}/>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:6 }}>开启时间</div>
                  <div style={{ fontSize:11, color:C.t3, marginBottom:6, display:'flex' }}>
                    <span style={{ flex:2, textAlign:'center' }}>年</span>
                    <span style={{ flex:1, textAlign:'center', marginLeft:8 }}>月</span>
                    <span style={{ flex:1, textAlign:'center', marginLeft:8 }}>日</span>
                  </div>
                  <div style={{ display:'flex', gap:8 }}>
                    <div style={{ flex:2 }}><ScrollPicker options={Array.from({length:30},(_,i)=>({ value:String(2025+i), label:(2025+i)+'年' }))} value={capForm.whenY} onChange={v=>setCapForm(f=>({...f,whenY:v}))}/></div>
                    <div style={{ flex:1 }}><ScrollPicker options={Array.from({length:12},(_,i)=>({ value:String(i+1), label:(i+1)+'月' }))} value={capForm.whenM} onChange={v=>setCapForm(f=>({...f,whenM:v}))}/></div>
                    <div style={{ flex:1 }}><ScrollPicker options={Array.from({length:31},(_,i)=>({ value:String(i+1), label:(i+1)+'日' }))} value={capForm.whenD} onChange={v=>setCapForm(f=>({...f,whenD:v}))}/></div>
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>送给谁（可多选）</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                    {['全家','女儿·陈小豆','妹妹·陈小雨','表哥的孩子'].map(p=>{
                      const sel = capForm.to.includes(p);
                      return <button key={p} onClick={()=>setCapForm(f=>({ ...f, to: sel ? f.to.filter(x=>x!==p) : [...f.to, p] }))} style={{ height:34, padding:'0 14px', borderRadius:9999, background:sel?C.primary:'transparent', border:'1.5px solid '+(sel?C.primary:C.border), color:sel?'#fff':C.t1, fontSize:12.5, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:5 }}>
                        {sel && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                        {p}
                      </button>;
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {!gen && (
        <div style={{ padding:'12px 18px calc(34px + env(safe-area-inset-bottom))', borderTop:`1px solid ${C.border}`, background:'#FFFDF8', flexShrink:0 }}>

              {isCapsule ? '封存并点亮' : '点亮这种味道'}
            </span>
          </Btn>
        </div>
      )}
    </div>
  );
}

// ── ScrollPicker：鼓轮滚动选择器 ──────────────────────────────
function ScrollPicker({ options, value, onChange }) {
  const ITEM_H = 38;
  const ref = React.useRef();
  const debounce = React.useRef(null);
  const curIdx = options.findIndex(o=>o.value===value);

  React.useEffect(()=>{
    if(ref.current){
      ref.current.scrollTop = Math.max(0, curIdx) * ITEM_H;
    }
  // eslint-disable-next-line
  },[]);

  function onScroll(){
    clearTimeout(debounce.current);
    debounce.current = setTimeout(()=>{
      const i = Math.round(ref.current.scrollTop / ITEM_H);
      const clamped = Math.max(0, Math.min(i, options.length-1));
      ref.current.scrollTop = clamped * ITEM_H;
      onChange(options[clamped].value);
    }, 120);
  }

  return (
    <div style={{ position:'relative', flex:1, height: ITEM_H*3, overflow:'hidden', borderRadius:10, background:'#FFFDF8', border:'1px solid '+C.border }}>
      {/* 选中高亮条 */}
      <div style={{ position:'absolute', top:ITEM_H, left:0, right:0, height:ITEM_H, background:'rgba(40,91,78,0.09)', borderTop:'1px solid rgba(40,91,78,0.15)', borderBottom:'1px solid rgba(40,91,78,0.15)', pointerEvents:'none', zIndex:1 }}/>
      {/* 上下渐变遮罩 */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height:ITEM_H, background:'linear-gradient(to bottom, rgba(255,253,248,0.9) 0%, rgba(255,253,248,0) 100%)', pointerEvents:'none', zIndex:2 }}/>
      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:ITEM_H, background:'linear-gradient(to top, rgba(255,253,248,0.9) 0%, rgba(255,253,248,0) 100%)', pointerEvents:'none', zIndex:2 }}/>
      <div ref={ref} onScroll={onScroll} style={{ height:'100%', overflowY:'scroll', scrollSnapType:'y mandatory', paddingTop:ITEM_H, paddingBottom:ITEM_H, scrollbarWidth:'none', WebkitOverflowScrolling:'touch' }}>
        <style>{'div::-webkit-scrollbar{display:none}'}</style>
        {options.map((o,i)=>(
          <div key={o.value} style={{ height:ITEM_H, scrollSnapAlign:'start', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight: o.value===value?700:400, color: o.value===value?C.primary:C.t3, transition:'color 0.1s, font-weight 0.1s', cursor:'pointer' }} onClick={()=>{ ref.current.scrollTop=i*ITEM_H; onChange(o.value); }}>{o.label}</div>
        ))}
      </div>
    </div>
  );
}

          <Btn variant="outline" fullWidth onClick={()=>setSheet(null)}>取消</Btn>
        </div>
      </BottomSheet>

      <BottomSheet open={sheet==='transfer'} onClose={()=>setSheet(null)} title="转让创建者">
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          <div style={{ fontSize:13, color:C.t2, lineHeight:1.8, padding:'0 0 6px' }}>选一位家人接手。转让后你变为普通成员。</div>
          {members.filter(m=>!m.you && !m.pending).map(m=>(

            </button>
          ))}
        </div>
      </BottomSheet>

      <BottomSheet open={sheet==='quit'} onClose={()=>setSheet(null)} title="退出家族">
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ background:C.warnBg, border:`1px solid ${C.warnBdr}`, borderRadius:12, padding:'12px 14px', fontSize:13, color:C.warn, lineHeight:1.85 }}>你是该家族的创建者，请先「转让创建者」后再退出。</div>
          <Btn variant="outline" fullWidth onClick={()=>setSheet(null)}>知道了</Btn>
        </div>
      </BottomSheet>

      
    </div>
  );
}

// P_Register — 创建新账号（全页版）
// ══════════════════════════════════════════════════
function P_Register() {
  const { navigate, showToast } = useApp();
  const [reg, setReg] = React.useState({ username:'', password:'', confirm:'', nickname:'', secA1:'', secA2:'', agreed:false });
  const [regErr, setRegErr] = React.useState({});
  function handleReg() {
    const e = {};
    if (!reg.username.trim()) e.username = '用户名不能为空';
    else if (!/^[a-zA-Z0-9_]{3,20}$/.test(reg.username)) e.username = '3-20位字母数字下划线';
    if (reg.password.length < 6) e.password = '至少 6 位';
    if (reg.confirm !== reg.password) e.confirm = '两次密码不一致';
    if (!reg.nickname.trim()) e.nickname = '昵称不能为空';
    if (!reg.secA1.trim()) e.secA1 = '请填写密保答案';
    if (!reg.agreed) e.agreed = '请同意协议';
    setRegErr(e);
    if (Object.keys(e).length) return;
    showToast('注册成功！'); navigate(-1);
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="创建新账号" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:14 }}>
        <AppInput label="用户名" placeholder="字母、数字、下划线" value={reg.username} onChange={v=>{ setReg(r=>({...r,username:v})); setRegErr(e=>({...e,username:''})); }} error={regErr.username}/>
        <AppInput label="密码" placeholder="至少 6 位" type="password" value={reg.password} onChange={v=>{ setReg(r=>({...r,password:v})); setRegErr(e=>({...e,password:''})); }} error={regErr.password}/>
        <AppInput label="确认密码" placeholder="再输一次" type="password" value={reg.confirm} onChange={v=>{ setReg(r=>({...r,confirm:v})); setRegErr(e=>({...e,confirm:''})); }} error={regErr.confirm}/>
        <AppInput label="昵称" placeholder="家人们叫你什么" value={reg.nickname} onChange={v=>{ setReg(r=>({...r,nickname:v})); setRegErr(e=>({...e,nickname:''})); }} error={regErr.nickname}/>
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>设置密保问题</div>
          <div style={{ background:'#F5F0E8', borderRadius:10, padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ fontSize:12, color:C.t2, fontWeight:500 }}>你小时候最爱吃的一道菜叫什么？</div>
            <AppInput placeholder="填写答案，用于找回密码" value={reg.secA1} onChange={v=>{ setReg(r=>({...r,secA1:v})); setRegErr(e=>({...e,secA1:''})); }} error={regErr.secA1}/>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>
          <button onClick={()=>setReg(r=>({...r,agreed:!r.agreed}))} style={{ width:20, height:20, borderRadius:4, border:'1.5px solid '+(reg.agreed?C.primary:C.border), background:reg.agreed?C.primary:'transparent', cursor:'pointer', flexShrink:0, marginTop:2, display:'flex', alignItems:'center', justifyContent:'center' }}>
            {reg.agreed && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </button>
          <div style={{ fontSize:12, color:C.t2, lineHeight:1.7 }}>我已阅读并同意<span style={{ color:C.primary }}>《用户协议》</span>与<span style={{ color:C.primary }}>《隐私政策》</span>{regErr.agreed && <span style={{ color:C.red, marginLeft:4 }}>{regErr.agreed}</span>}</div>
        </div>
        <Btn onClick={handleReg} fullWidth size="lg">注 册</Btn>
      </div>
    </div>
  );
}

  const [code, setCode] = React.useState('');
  const [codeErr, setCodeErr] = React.useState('');
  const VALID = ['YJ2026','ABCD12','HOME01'];
  const inputRef = React.useRef();
  function handleJoin() {
    if (code.length !== 6) { setCodeErr('请输入完整的 6 位代码'); return; }
    if (!VALID.includes(code.toUpperCase())) { setCodeErr('代码不存在或已过期'); return; }
    showToast('验证成功，正在加入…'); setTimeout(()=>navigate('P3'), 1000);
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="加入家族" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:16 }}>
        <div style={{ fontSize:14, color:C.t2, lineHeight:1.8 }}>向已加入家族的成员索取 6 位代码</div>
        <div style={{ position:'relative' }} onClick={()=>inputRef.current?.focus()}>
          <input ref={inputRef} value={code} onChange={e=>{ setCode(e.target.value.toUpperCase().slice(0,6)); setCodeErr(''); }} style={{ position:'absolute', opacity:0, width:'100%', height:'100%', zIndex:1 }} maxLength={6}/>
          <div style={{ display:'flex', gap:8, justifyContent:'center' }}>
            {Array.from({length:6},(_,i)=>(
              <div key={i} style={{ width:44, height:52, background:C.inputBg, border:'2px solid '+(code[i]?C.primary:codeErr?C.red:C.border), borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, fontWeight:700, color:C.primary, transition:'border-color 0.15s' }}>{code[i]||''}</div>
            ))}
          </div>
        </div>
        {codeErr && <div style={{ fontSize:12.5, color:C.red, textAlign:'center' }}>{codeErr}</div>}
        <Btn onClick={handleJoin} disabled={code.length!==6} fullWidth size="lg">验证并加入</Btn>
        <div style={{ textAlign:'center', fontSize:13, color:C.t3 }}>没有代码？<button onClick={()=>navigate('P_CreateFamily')} style={{ border:'none', background:'none', cursor:'pointer', color:C.primary, fontSize:13, fontFamily:'inherit', fontWeight:600 }}>创建你自己的家族</button></div>
      </div>
    </div>
  );
}

const PW=390, PH=844;

// ── PhoneApp：纯手机壳（390×844），供 Gallery 嵌入 ──
function PhoneApp() {
  const initId = () => { const h=window.location.hash.slice(1); return SCREENS.find(s=>s.id===h)?h:'P0'; };
  const [page, setPage] = React.useState(initId);
  const [history, setHistory] = React.useState([initId()]);
  const [toast, setToast] = React.useState({msg:'',on:false});
  const toastRef = React.useRef();
  function showToast(msg) { clearTimeout(toastRef.current); setToast({msg,on:true}); toastRef.current=setTimeout(()=>setToast(t=>({...t,on:false})),2200); }
  const navigate = React.useCallback((id)=>{
    if (id === -1) {
      setHistory(h=>{ const nh=[...h]; nh.pop(); const prev=nh[nh.length-1]||'P0'; setPage(prev); window.location.hash=prev; return nh; });
    } else {
      setPage(id); window.location.hash=id;
      setHistory(h=>[...h, id]);
    }
  }, []);
  React.useEffect(()=>{
    const onHash = ()=>{ const id=window.location.hash.slice(1); if(SCREENS.find(s=>s.id===id)){ setPage(id); setHistory(h=> h[h.length-1]===id ? h : [...h,id]); } };
    window.addEventListener('hashchange', onHash);
    return ()=>window.removeEventListener('hashchange', onHash);
  }, []);
  const cur = SCREENS.find(s=>s.id===page)||SCREENS[0];
  const prevId = history.length>1?history[history.length-2]:null;
  const [dir, setDir] = React.useState(1);
  React.useEffect(()=>{ const inner=SCREENS.find(s=>s.id===page); setDir(inner?.group==='内页'?1:prevId&&SCREENS.findIndex(s=>s.id===page)>SCREENS.findIndex(s=>s.id===prevId)?1:-1); },[page]);
  return (
    <AppContext.Provider value={{ navigate, showToast }}>
      <div style={{ width:PW, height:PH, position:'relative', overflow:'hidden', background:'#FFFDF8' }}>
        <StatusBar/>
        <div key={page} style={{ position:'absolute', inset:0, animation:`slideIn${dir>0?'Right':'Left'} 0.28s cubic-bezier(0.32,0,0.2,1) forwards` }}>
          <cur.Comp/>
        </div>
        <Toast message={toast.msg} visible={toast.on}/>
      </div>
    </AppContext.Provider>
  );
}

// ── Gallery：设计画廊外壳（左侧栏 + 等比缩放舞台）──
function Gallery() {
  const [activePage, setActivePage] = React.useState(()=>{
    const h=window.location.hash.slice(1); return SCREENS.find(s=>s.id===h)?h:'P0';
  });
  const [openGroups, setOpenGroups] = React.useState({});
  const sidebarRef = React.useRef();

  // 同步 hash → 左侧高亮
  React.useEffect(()=>{
    const onHash=()=>{ const id=window.location.hash.slice(1); if(SCREENS.find(s=>s.id===id)) setActivePage(id); };
    window.addEventListener('hashchange', onHash);
    return ()=>window.removeEventListener('hashchange', onHash);
  },[]);

  // 键盘翻页
  React.useEffect(()=>{
    const onKey=(e)=>{
      const idx=SCREENS.findIndex(s=>s.id===activePage);
      if(e.key==='ArrowRight'&&idx<SCREENS.length-1) window.location.hash=SCREENS[idx+1].id;
      else if(e.key==='ArrowLeft'&&idx>0) window.location.hash=SCREENS[idx-1].id;
    };
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[activePage]);

  // 舞台等比缩放
  const [scale, setScale] = React.useState(1);
  const stageRef = React.useRef();
  React.useEffect(()=>{
    const calc=()=>{
      if(!stageRef.current) return;
      const r=stageRef.current.getBoundingClientRect();
      setScale(Math.min((r.width-48)/PW, (r.height-48)/PH));
    };
    calc();
    const ro=new ResizeObserver(calc);
    if(stageRef.current) ro.observe(stageRef.current);
    return ()=>ro.disconnect();
  },[]);

  // 自动将活动项滚入视野
  React.useEffect(()=>{
    if(!sidebarRef.current) return;
    const el=sidebarRef.current.querySelector('[data-active="true"]');
    if(el) { const top=el.offsetTop; const sb=sidebarRef.current; if(top<sb.scrollTop||top+el.offsetHeight>sb.scrollTop+sb.clientHeight) sb.scrollTop=top-sb.clientHeight/2+el.offsetHeight/2; }
  },[activePage]);

  const groups=[...new Set(SCREENS.map(s=>s.group))];

  return (
    <div style={{ width:'100vw', height:'100dvh', display:'flex', background:'#111', overflow:'hidden', fontFamily:'system-ui,-apple-system,"PingFang SC","Helvetica Neue",sans-serif' }}>

      {/* ── 左侧目录栏 ── */}
      <div ref={sidebarRef} style={{ width:220, flexShrink:0, height:'100%', background:'#161616', borderRight:'1px solid #252525', overflowY:'auto', display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'18px 18px 12px', fontSize:13, fontWeight:700, color:'#7FC5B4', letterSpacing:0.5 }}>一家食光</div>
        <div style={{ flex:1 }}>
          {groups.map(group=>{
            const screens=SCREENS.filter(s=>s.group===group);
            const isOpen=openGroups[group]!==false;
            return (
              <div key={group} style={{ marginBottom:2 }}>
                <button onClick={()=>setOpenGroups(g=>({...g,[group]:!isOpen}))}
                  style={{ width:'100%', padding:'7px 18px', background:'transparent', border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:7, color:'#555', fontSize:10.5, fontFamily:'inherit', textAlign:'left', letterSpacing:1.2, fontWeight:700 }}>
                  <svg width="7" height="7" viewBox="0 0 8 8" fill="none" style={{ transform:isOpen?'rotate(90deg)':'rotate(0)', transition:'transform 0.15s', flexShrink:0 }}>
                    <path d="M2 1l4 3-4 3" stroke="#555" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  {group.toUpperCase()}
                </button>
                {isOpen && screens.map(s=>{
                  const isActive=activePage===s.id;
                  const num=String(SCREENS.indexOf(s)+1).padStart(2,'0');
                  return (
                    <button key={s.id} data-active={isActive}
                      onClick={()=>{ window.location.hash=s.id; }}
                      style={{ width:'100%', padding:'8px 18px 8px 30px', background:isActive?'rgba(40,91,78,0.22)':'transparent', border:'none', borderLeft:isActive?'2px solid #285B4E':'2px solid transparent', cursor:'pointer', display:'flex', alignItems:'center', gap:9, color:isActive?'#7FC5B4':'#888', fontSize:12.5, fontFamily:'inherit', textAlign:'left', transition:'background 0.1s,color 0.1s', boxSizing:'border-box' }}>
                      <span style={{ color:'#3a3a3a', fontSize:10, minWidth:20, fontVariantNumeric:'tabular-nums' }}>{num}</span>
                      <span style={{ lineHeight:1.3 }}>{s.label}</span>
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
        <div style={{ padding:'10px 18px 14px', fontSize:10, color:'#333', borderTop:'1px solid #222', display:'flex', alignItems:'center', gap:6 }}>
          <kbd style={{ background:'#222', border:'1px solid #333', borderRadius:3, padding:'1px 5px', fontSize:10, color:'#555' }}>←</kbd>
          <kbd style={{ background:'#222', border:'1px solid #333', borderRadius:3, padding:'1px 5px', fontSize:10, color:'#555' }}>→</kbd>
          <span style={{ color:'#333' }}>翻页</span>
        </div>
      </div>

      {/* ── 中央舞台 ── */}
      <div ref={stageRef} style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', background:'#111', overflow:'hidden' }}>
        {/*
          布局占位层：宽高 = PW*scale × PH*scale，仅用于 flex 定位，不做 overflow 裁切
          视觉渲染层：保持 PW×PH 原始尺寸，transform:scale 缩放，overflow:hidden 裁切自身子元素
        */}
        <div style={{ width: PW * scale, height: PH * scale, flexShrink:0, position:'relative' }}>
          <div style={{
            position: 'absolute', top: 0, left: 0,
            width: PW, height: PH,
            transformOrigin: 'top left',
            transform: `scale(${scale})`,
            borderRadius: 44,
            overflow: 'hidden',
            boxShadow: '0 32px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07)'
          }}>
            <PhoneApp/>
          </div>
        </div>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Gallery/>);
</script>
