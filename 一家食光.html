// P_EditProfile — 编辑个人资料（全页版）
// ══════════════════════════════════════════════════
function P_EditProfile() {
  const { navigate, showToast } = useApp();
  const [ed, setEd] = React.useState({ name:'', gender:'', bType:'阳历', bYear:'', bMonth:'', bDay:'', hometown:'', dish:'', avatarUrl:'' });
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState(false);
  const [avatarUploading, setAvatarUploading] = React.useState(false);
  const fileRef = React.useRef();
  // 加载真实 profile
  React.useEffect(()=>{ (async()=>{
    const u = (await window.sb.auth.getUser()).data.user;
    if (!u) { navigate('P1'); return; }
    const { data: prof } = await window.sb.from('profiles').select('*').eq('id', u.id).maybeSingle();
    if (prof) {
      const bd = (prof.birthday || '').toString().split('-');
      setEd({
        name: prof.nickname || '',
        gender: prof.gender === 'female' ? '女' : '男',
        bType: '阳历', bYear: bd[0] || '', bMonth: bd[1] ? String(Number(bd[1])) : '', bDay: bd[2] ? String(Number(bd[2])) : '',
        hometown: prof.hometown || '',
        dish: prof.dish || '',
        avatarUrl: prof.avatar_url || '',
      });
    }
    setLoading(false);
  })(); }, []);
  // 上传头像：读文件→4:3裁剪→上传 avatars 桶
  async function pickAvatar(e) {
    const file = e.target.files && e.target.files[0]; e.target.value = ''; if (!file) return;
    setAvatarUploading(true);
    const r = await window.api.upload.imageCropped(file, 'avatars', 'me');
    setAvatarUploading(false);
    if (r.ok) { setEd(m=>({...m, avatarUrl: r.url})); showToast('头像已更新'); }
    else showToast('上传失败：'+(r.error||''));
  }
  // 保存
  async function save() {
    if (saving) return;
    setSaving(true);
    const u = (await window.sb.auth.getUser()).data.user;
    const birthday = ed.bYear ? `${ed.bYear}-${(ed.bMonth||'01').padStart(2,'0')}-${(ed.bDay||'01').padStart(2,'0')}` : null;
    const { error } = await window.sb.from('profiles').update({
      nickname: ed.name.trim(),
      gender: ed.gender === '女' ? 'female' : 'male',
      birthday, hometown: ed.hometown, dish: ed.dish,
      avatar_url: ed.avatarUrl || null,
      updated_at: new Date().toISOString(),
    }).eq('id', u.id);
    setSaving(false);
    if (error) { showToast('保存失败：'+error.message); return; }
    showToast('已保存'); navigate(-1);
  }
  const initial = ed.name ? ed.name[0] : '?';
  if (loading) return <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', alignItems:'center', justifyContent:'center', color:C.t3, fontSize:13 }}>加载中…</div>;
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="编辑个人资料" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:16 }}>
        {/* 头像 — 支持拍照/上传 */}
        <div style={{ textAlign:'center', paddingTop:8 }}>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display:'none' }} onChange={pickAvatar}/>
          <div onClick={()=>{ if(!avatarUploading) fileRef.current && fileRef.current.click(); }} style={{ width:72, height:72, borderRadius:'50%', overflow:'hidden', background:C.primary, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:28, fontWeight:700, fontFamily:'"Noto Serif SC",serif', margin:'0 auto 8px', cursor:'pointer', position:'relative', border:'3px solid '+C.primary100 }}>
            {ed.avatarUrl ? <img src={ed.avatarUrl} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }}/> : (avatarUploading ? <span style={{ fontSize:11 }}>…</span> : initial)}
          </div>
          <div style={{ fontSize:12, color:C.t3 }}>{avatarUploading ? '上传中…' : '点击更换头像（拍照/相册）'}</div>
        </div>
        <AppInput label="昵称" placeholder="你的姓名" value={ed.name} onChange={v=>setEd(m=>({...m,name:v}))}/>
        {/* 性别 */}
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>性别</div>
          <div style={{ display:'flex', gap:8 }}>
            {['男','女'].map(g=>(<button key={g} onClick={()=>setEd(m=>({...m,gender:g}))} style={{ flex:1, height:38, borderRadius:9999, background:ed.gender===g?C.primary:'transparent', border:`1.5px solid ${ed.gender===g?C.primary:C.border}`, color:ed.gender===g?'#fff':C.t1, fontSize:14, cursor:'pointer', fontFamily:'inherit', fontWeight:ed.gender===g?600:400, transition:'all 0.15s' }}>{g}</button>))}
          </div>
        </div>
        {/* 故乡 / 籍贯 */}
        <LocationPicker value={ed.hometown||''} onChange={v=>setEd(m=>({...m,hometown:v}))}/>
        {/* 代表味道（选填） */}
        <AppInput label="代表味道（选填）" placeholder="例：外婆的辣子鸡" value={ed.dish||''} onChange={v=>setEd(m=>({...m,dish:v}))}/>
        {/* 生日 */}
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>生日</div>
          <div style={{ display:'flex', gap:8, marginBottom:10 }}>
            {['阳历','农历'].map(t=>(<button key={t} onClick={()=>setEd(m=>({...m,bType:t}))} style={{ flex:1, height:34, borderRadius:9999, background:ed.bType===t?C.primary:'transparent', border:'1.5px solid '+(ed.bType===t?C.primary:C.border), color:ed.bType===t?'#fff':C.t1, fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>{t}</button>))}
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:C.t3, marginBottom:4 }}>年</div>
            <input type="number" min="1900" max="2024" placeholder="例：1990" value={ed.bYear||''} onChange={e=>setEd(m=>({...m,bYear:e.target.value}))} style={{ width:'100%', boxSizing:'border-box', height:40, border:'1px solid '+C.border, borderRadius:10, padding:'0 12px', fontSize:14, fontFamily:'inherit', background:'#FFFDF8', outline:'none' }}/>
          </div>
          <div style={{ fontSize:11, color:C.t3, marginBottom:4, display:'flex' }}><span style={{ flex:1, textAlign:'center' }}>月</span><span style={{ flex:1, textAlign:'center', marginLeft:10 }}>日</span></div>
          <div style={{ display:'flex', gap:10 }}>
            <ScrollPicker options={[{value:'',label:'未知'},...Array.from({length:12},(_,i)=>({value:String(i+1),label:(i+1)+'月'}))]} value={ed.bMonth||''} onChange={v=>setEd(m=>({...m,bMonth:v}))}/>
            <ScrollPicker options={[{value:'',label:'未知'},...Array.from({length:31},(_,i)=>({value:String(i+1),label:(i+1)+'日'}))]} value={ed.bDay||''} onChange={v=>setEd(m=>({...m,bDay:v}))}/>
          </div>
        </div>
        <Btn onClick={save} disabled={saving} fullWidth size="lg">{saving?'保存中…':'保存'}</Btn>
      </div>
    </div>
  );
}

// P_Drafts — 我的草稿（全页版）
// ══════════════════════════════════════════════════
function P_Drafts() {
  const { navigate, showToast } = useApp();
  const [drafts, setDrafts] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(()=>{ (async()=>{
    const list = await window.api.conversation.drafts();
    setDrafts(list || []); setLoading(false);
  })(); }, []);
  function when(ts) { if(!ts) return ''; const d=new Date(ts); return `${d.getMonth()+1}月${d.getDate()}日`; }
  async function del(id) {
    const r = await window.api.conversation.remove(id);
    if (r.ok) { setDrafts(ds=>ds.filter(x=>x.id!==id)); window.__statsDirty = Date.now(); showToast('已删除'); } else showToast('删除失败');
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="我的草稿" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:10 }}>
        {!loading && drafts.length===0 && (
          <div style={{ paddingTop:60, display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z" stroke={C.border} strokeWidth="1.5"/><path d="M14 2v6h6M8 13h8M8 17h5" stroke={C.border} strokeWidth="1.5" strokeLinecap="round"/></svg>
            <div style={{ fontSize:13, color:C.t4 }}>还没有草稿</div>
          </div>
        )}
        {drafts.map(d=>(
          <div key={d.id} style={{ background:'#FFFDF8', border:'1px solid '+C.border, borderRadius:12, padding:'12px 14px', display:'flex', gap:12, alignItems:'center' }}>
            <div style={{ width:42, height:42, borderRadius:8, background:C.primaryPale, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3a7 7 0 0 1 7 7v3l1.5 3-2 .5L18 19a6 6 0 0 1-6 4 6 6 0 0 1-6-4l-.5-2.5-2-.5L5 13v-3a7 7 0 0 1 7-7Z" stroke={C.primary} strokeWidth="1.6" strokeLinejoin="round"/></svg>
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:14, fontWeight:600, color:C.t1, fontFamily:'"Noto Serif SC",serif' }}>{d.title || '未命名的味道'}</div>
              <div style={{ fontSize:11.5, color:C.t3, marginTop:2 }}>{when(d.updated_at||d.created_at)}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              <Btn variant="outline" onClick={()=>{ window.__p30ctx={ type:'draft', convId:d.id, name:d.title||'' }; navigate('P30'); }} xstyle={{ fontSize:12, padding:'0 10px', height:30 }}>继续</Btn>
              <button onClick={()=>del(d.id)} style={{ height:30, border:'1px solid '+C.border, borderRadius:8, background:'transparent', cursor:'pointer', fontSize:12, color:C.red, fontFamily:'inherit', padding:'0 10px' }}>删除</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// P_EditMember — 编辑家人资料（全页版）
// ══════════════════════════════════════════════════
function P_EditMember() {
  const { navigate, showToast } = useApp();
  const [src] = React.useState(window.__editMemCtx || {});  // 只在挂载取一次（effect 会清空全局）
  React.useEffect(()=>{ window.__editMemCtx=null; },[]);
  const [members, setMembers] = React.useState([]);
  React.useEffect(()=>{ if (src.familyId) window.api.family.graph(src.familyId).then(g=>setMembers(g.members)); },[]);
  const _bd = (src.birth_date || '').split('-');
  const [ed, setEd] = React.useState({
    name: src.name || '',
    gender: src.gender === 'female' ? '女' : (src.gender === 'male' ? '男' : ''),
    bType: src.birth_type === 'lunar' ? '农历' : '阳历',
    bYear: _bd[0] || '', bMonth: _bd[1] ? String(Number(_bd[1])) : '', bDay: _bd[2] ? String(Number(_bd[2])) : '',
    bLeave: src.death_year ? String(src.death_year) : '',
    hometown: src.hometown || '', dish: src.dish || '', moreOpen: !!src.death_year,
    anchorId: null, rel: '',
  });
  const RELS = ['父亲','母亲','儿子','女儿','丈夫','妻子'];
  const anchorMember = members.find(mm => mm.id === ed.anchorId);
  const [saving, setSaving] = React.useState(false);
  async function save() {
    if (saving) return;
    if (!src.id) { showToast('成员信息缺失'); return; }
    setSaving(true);
    const r = await window.api.family.updateMember(src.id, {
      name: ed.name.trim(),
      gender: ed.gender === '女' ? 'female' : 'male',
      bType: ed.bType,
      birthYear: ed.bYear, birthMonth: ed.bMonth, birthDay: ed.bDay,
      deathYear: ed.bLeave, hometown: ed.hometown, dish: ed.dish,
    });
    if (!r.ok) { setSaving(false); showToast(r.error || '保存失败'); return; }
    if (ed.anchorId && ed.rel) {
      const r2 = await window.api.family.setRelation({ familyId: src.familyId, memberId: src.id, anchorId: ed.anchorId, rel: ed.rel });
      setSaving(false);
      if (!r2.ok) { showToast('资料已保存，但关系更新失败：' + (r2.error||'')); return; }
    } else { setSaving(false); }
    showToast('资料已保存'); navigate(-1);
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="编辑家人资料" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:16 }}>
        {/* 头像 + 姓名 */}
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'4px 0 6px' }}>
          <div style={{ width:52, height:52, borderRadius:'50%', background:C.primaryPale, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, fontWeight:700, fontFamily:'"Noto Serif SC",serif', color:C.primary }}>{(ed.name||src.name||'家')[0]}</div>
          <div><div style={{ fontSize:16, fontWeight:700, color:C.t1, fontFamily:'"Noto Serif SC",serif' }}>{src.name||'家人'}</div><div style={{ fontSize:12, color:C.t3 }}>{src.status==='deceased'?'已故':'在世'} · 资料编辑</div></div>
        </div>
        <AppInput label="姓名" value={ed.name} onChange={v=>setEd(m=>({...m,name:v}))}/>
        {/* 性别 */}
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>性别</div>
          <div style={{ display:'flex', gap:8 }}>
            {['男','女'].map(g=>(<button key={g} onClick={()=>setEd(m=>({...m,gender:g}))} style={{ flex:1, height:38, borderRadius:9999, background:ed.gender===g?C.primary:'transparent', border:`1.5px solid ${ed.gender===g?C.primary:C.border}`, color:ed.gender===g?'#fff':C.t1, fontSize:14, cursor:'pointer', fontFamily:'inherit', fontWeight:ed.gender===g?600:400, transition:'all 0.15s' }}>{g}</button>))}
          </div>
        </div>
        {/* 与谁是什么关系（§3.3：6 关系单选；保存后重定位，家谱树/称呼自动更新）*/}
        {members.filter(mm=>mm.id!==src.id).length > 0 && (
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>与谁是什么关系</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {members.filter(mm=>mm.id!==src.id).map(mm=>{
                const sel = ed.anchorId === mm.id;
                return (
                  <button key={mm.id} onClick={()=>setEd(m=>({...m,anchorId:sel?null:mm.id,rel:''}))}
                    style={{ width:60, display:'flex', flexDirection:'column', alignItems:'center', gap:5, padding:'10px 0 8px', background:sel?C.primaryPale:'transparent', border:`1.5px solid ${sel?C.primary:C.border}`, borderRadius:12, cursor:'pointer', transition:'all 0.15s' }}>
                    <div style={{ width:36, height:36, borderRadius:'50%', background:sel?C.primary:C.inputBg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:sel?'#fff':C.t2 }}>{(mm.name||'家')[0]}</div>
                    <span style={{ fontSize:11, color:sel?C.primary:C.t2, fontWeight:sel?600:400, maxWidth:52, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{mm.name}</span>
                  </button>
                );
              })}
            </div>
            {anchorMember && (
              <div style={{ marginTop:12 }}>
                <div style={{ fontSize:13, color:C.t2, marginBottom:8 }}>TA 是 <strong style={{ color:C.primaryDark }}>{anchorMember.name}</strong> 的——</div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                  {RELS.map(r=>(
                    <button key={r} onClick={()=>setEd(m=>({...m,rel:r}))} style={{ height:36, padding:'0 16px', borderRadius:9999, background:ed.rel===r?C.primary:'transparent', border:`1.5px solid ${ed.rel===r?C.primary:C.border}`, color:ed.rel===r?'#fff':C.t1, fontSize:14, fontWeight:ed.rel===r?600:400, cursor:'pointer', fontFamily:'inherit' }}>{r}</button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
        {/* 故乡 / 籍贯 */}
        <LocationPicker value={ed.hometown||''} onChange={v=>setEd(m=>({...m,hometown:v}))}/>
        {/* 代表味道（选填） */}
        <AppInput label="代表味道（选填）" placeholder="例：外婆的辣子鸡" value={ed.dish||''} onChange={v=>setEd(m=>({...m,dish:v}))}/>
        {/* 生日 */}
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>生日</div>
          <div style={{ display:'flex', gap:8, marginBottom:10 }}>
            {['阳历','农历'].map(t=>(<button key={t} onClick={()=>setEd(m=>({...m,bType:t}))} style={{ flex:1, height:34, borderRadius:9999, background:ed.bType===t?C.primary:'transparent', border:'1.5px solid '+(ed.bType===t?C.primary:C.border), color:ed.bType===t?'#fff':C.t1, fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>{t}</button>))}
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:C.t3, marginBottom:4 }}>年</div>
            <input type="number" min="1900" max="2024" placeholder="例：1942" value={ed.bYear||''} onChange={e=>setEd(m=>({...m,bYear:e.target.value}))} style={{ width:'100%', boxSizing:'border-box', height:40, border:'1px solid '+C.border, borderRadius:10, padding:'0 12px', fontSize:14, fontFamily:'inherit', background:'#FFFDF8', outline:'none' }}/>
          </div>
          <div style={{ fontSize:11, color:C.t3, marginBottom:4, display:'flex' }}><span style={{ flex:1, textAlign:'center' }}>月</span><span style={{ flex:1, textAlign:'center', marginLeft:10 }}>日</span></div>
          <div style={{ display:'flex', gap:10 }}>
            <ScrollPicker options={[{value:'',label:'未知'},...Array.from({length:12},(_,i)=>({value:String(i+1),label:(i+1)+'月'}))]} value={ed.bMonth||''} onChange={v=>setEd(m=>({...m,bMonth:v}))}/>
            <ScrollPicker options={[{value:'',label:'未知'},...Array.from({length:31},(_,i)=>({value:String(i+1),label:(i+1)+'日'}))]} value={ed.bDay||''} onChange={v=>setEd(m=>({...m,bDay:v}))}/>

        </div>
        {/* 更多生平信息（默认折叠）*/}
        <button onClick={()=>setEd(m=>({...m,moreOpen:!m.moreOpen}))} style={{ display:'flex', alignItems:'center', gap:6, background:'none', border:'none', cursor:'pointer', padding:'2px 0', fontFamily:'inherit' }}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ transform:ed.moreOpen?'rotate(180deg)':'rotate(0)', transition:'transform 0.2s' }}><path d="M2 4l4 4 4-4" stroke={C.t3} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <span style={{ fontSize:12.5, color:C.t3, fontWeight:500 }}>更多生平信息</span>
        </button>
        {ed.moreOpen && (
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:6 }}>离开的那一年</div>
            <input type="number" min="1900" max="2030" placeholder="若 TA 已离世，填入年份；留空则视为在世" value={ed.bLeave||''} onChange={e=>setEd(m=>({...m,bLeave:e.target.value}))} style={{ width:'100%', boxSizing:'border-box', height:40, border:'1px solid '+C.border, borderRadius:10, padding:'0 12px', fontSize:13, fontFamily:'inherit', background:'#FFFDF8', outline:'none', color:C.t2 }}/>
            {ed.bLeave && <div style={{ fontSize:11, color:C.warn, marginTop:4 }}>填入年份后保存，TA 将转为「已故」，家谱节点以已故样式显示</div>}
          </div>
        )}
        <Btn onClick={save} disabled={saving} fullWidth size="lg">{saving?'保存中…':'保存'}</Btn>
      </div>
    </div>
  );

// P_Register — 创建新账号（全页版）
// ══════════════════════════════════════════════════
function P_Register() {
  const { navigate, showToast } = useApp();
  const [reg, setReg] = React.useState({ username:'', password:'', confirm:'', nickname:'', secA1:'', secA2:'', agreed:false });
  const [regErr, setRegErr] = React.useState({});
  async function handleReg() {
    const e = {};
    if (!reg.username.trim()) e.username = '用户名不能为空';
    else if (!/^[a-zA-Z0-9_]{3,20}$/.test(reg.username)) e.username = '3-20位字母数字下划线';
    if (reg.password.length < 6) e.password = '至少 6 位';
    if (reg.confirm !== reg.password) e.confirm = '两次密码不一致';
    if (!reg.nickname.trim()) e.nickname = '昵称不能为空';
    if (!reg.secA1.trim()) e.secA1 = '请填写密保答案';
    if (!reg.agreed) e.agreed = '请同意协议';
    setRegErr(e);
    if (Object.keys(e).length) return;
    const { error } = await window.api.auth.register({
      username: reg.username, password: reg.password, nickname: reg.nickname, securityAnswer: reg.secA1
    });
    if (error) {
      showToast(/already|registered|exists/i.test(error.message) ? '该用户名已被注册' : (error.message || '注册失败'));
      return;
    }
    showToast('注册成功，欢迎加入一家食光！');
    navigate('P2');
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="创建新账号" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:14 }}>
        <AppInput label="用户名" placeholder="字母、数字、下划线" value={reg.username} onChange={v=>{ setReg(r=>({...r,username:v})); setRegErr(e=>({...e,username:''})); }} error={regErr.username}/>
        <AppInput label="密码" placeholder="至少 6 位" type="password" value={reg.password} onChange={v=>{ setReg(r=>({...r,password:v})); setRegErr(e=>({...e,password:''})); }} error={regErr.password}/>
        <AppInput label="确认密码" placeholder="再输一次" type="password" value={reg.confirm} onChange={v=>{ setReg(r=>({...r,confirm:v})); setRegErr(e=>({...e,confirm:''})); }} error={regErr.confirm}/>
        <AppInput label="昵称" placeholder="家人们叫你什么" value={reg.nickname} onChange={v=>{ setReg(r=>({...r,nickname:v})); setRegErr(e=>({...e,nickname:''})); }} error={regErr.nickname}/>
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>设置密保问题</div>
          <div style={{ background:'#F5F0E8', borderRadius:10, padding:'12px 14px', display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ fontSize:12, color:C.t2, fontWeight:500 }}>你小时候最爱吃的一道菜叫什么？</div>
            <AppInput placeholder="填写答案，用于找回密码" value={reg.secA1} onChange={v=>{ setReg(r=>({...r,secA1:v})); setRegErr(e=>({...e,secA1:''})); }} error={regErr.secA1}/>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>
          <button onClick={()=>setReg(r=>({...r,agreed:!r.agreed}))} style={{ width:20, height:20, borderRadius:4, border:'1.5px solid '+(reg.agreed?C.primary:C.border), background:reg.agreed?C.primary:'transparent', cursor:'pointer', flexShrink:0, marginTop:2, display:'flex', alignItems:'center', justifyContent:'center' }}>
            {reg.agreed && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </button>
          <div style={{ fontSize:12, color:C.t2, lineHeight:1.7 }}>我已阅读并同意<span style={{ color:C.primary }}>《用户协议》</span>与<span style={{ color:C.primary }}>《隐私政策》</span>{regErr.agreed && <span style={{ color:C.red, marginLeft:4 }}>{regErr.agreed}</span>}</div>
        </div>
        <Btn onClick={handleReg} fullWidth size="lg">注 册</Btn>
      </div>
    </div>
  );
}

// P_JoinFamily — 加入家族（全页版）
// ══════════════════════════════════════════════════
function P_JoinFamily() {
  const { navigate, showToast } = useApp();
  const [code, setCode] = React.useState('');
  const [codeErr, setCodeErr] = React.useState('');
  const VALID = ['YJ2026','ABCD12','HOME01'];
  const inputRef = React.useRef();
  function handleJoin() {
    if (code.length !== 6) { setCodeErr('请输入完整的 6 位代码'); return; }
    if (!VALID.includes(code.toUpperCase())) { setCodeErr('代码不存在或已过期'); return; }
    showToast('验证成功，正在加入…'); setTimeout(()=>navigate('P3'), 1000);
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="加入家族" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:16 }}>
        <div style={{ fontSize:14, color:C.t2, lineHeight:1.8 }}>向已加入家族的成员索取 6 位代码</div>
        <div style={{ position:'relative' }} onClick={()=>inputRef.current?.focus()}>
          <input ref={inputRef} value={code} onChange={e=>{ setCode(e.target.value.toUpperCase().slice(0,6)); setCodeErr(''); }} style={{ position:'absolute', opacity:0, width:'100%', height:'100%', zIndex:1 }} maxLength={6}/>
          <div style={{ display:'flex', gap:8, justifyContent:'center' }}>
            {Array.from({length:6},(_,i)=>(
              <div key={i} style={{ width:44, height:52, background:C.inputBg, border:'2px solid '+(code[i]?C.primary:codeErr?C.red:C.border), borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, fontWeight:700, color:C.primary, transition:'border-color 0.15s' }}>{code[i]||''}</div>
            ))}
          </div>
        </div>
        {codeErr && <div style={{ fontSize:12.5, color:C.red, textAlign:'center' }}>{codeErr}</div>}
        <Btn onClick={handleJoin} disabled={code.length!==6} fullWidth size="lg">验证并加入</Btn>
        <div style={{ textAlign:'center', fontSize:13, color:C.t3 }}>没有代码？<button onClick={()=>navigate('P_CreateFamily')} style={{ border:'none', background:'none', cursor:'pointer', color:C.primary, fontSize:13, fontFamily:'inherit', fontWeight:600 }}>创建你自己的家族</button></div>
      </div>
    </div>
  );
}

    light:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.5 6h6l-5 4.5L17.5 19 12 15.5 6.5 19l2-6.5L3.5 8h6L12 2Z" stroke={C.primary} strokeWidth="1.7" strokeLinejoin="round"/></svg>,
    capsule: <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={C.primary} strokeWidth="1.7"/><path d="M12 7v5l3 2" stroke={C.primary} strokeWidth="1.7" strokeLinecap="round"/></svg>,

// P_EditFamily — 编辑家族信息（全页版）

function P_EditFamily() {
  const { navigate, showToast } = useApp();
  const [info, setInfo] = React.useState({ name:'', surname:'', desc:'' });
  const [famId, setFamId] = React.useState(window.__famCtx && window.__famCtx.id);
  const [isCreator, setIsCreator] = React.useState(true);
  React.useEffect(() => {
    (async () => {
      let id = window.__famCtx && window.__famCtx.id;
      if (!id) { const list = await window.api.family.list(); id = list[0] && list[0].id; }
      if (!id) return;
      setFamId(id);
      const f = await window.api.family.get(id);
      if (f) { setInfo({ name: f.name||'', surname: f.surname||'', desc: f.description||'' }); setIsCreator(!!f.isCreator); }

  if (!isCreator) {
    return (
      <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column' }}>

        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center' }}>
          <div>
            <div style={{ fontSize:15, color:C.t2, lineHeight:1.8 }}>仅家族创建者可编辑家族信息。</div>
            <div style={{ marginTop:18 }}><Btn variant="outline" onClick={()=>navigate(-1)}>返回</Btn></div>
          </div>
        </div>
      </div>
    );

  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title="编辑家族信息" onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 48px', display:'flex', flexDirection:'column', gap:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:14, padding:'4px 0 8px' }}>
          <div style={{ width:56, height:56, borderRadius:'50%', background:C.primary, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, fontWeight:700, fontFamily:'"Noto Serif SC",serif' }}>{info.surname||'陈'}</div>
          <div>

            <div style={{ fontSize:12, color:C.t3, marginTop:2 }}>家族头像自动取姓氏首字</div>
          </div>
        </div>
        <AppInput label="家族名称" placeholder="例：陈氏大家庭" value={info.name} onChange={v=>setInfo(i=>({...i,name:v}))}/>
        <AppInput label="家族姓氏" placeholder="例：陈" value={info.surname} onChange={v=>setInfo(i=>({...i,surname:v}))}/>
        <div>

          <textarea value={info.desc} onChange={e=>setInfo(i=>({...i,desc:e.target.value}))} rows={3} placeholder="简单介绍一下这个家族……" style={{ width:'100%', boxSizing:'border-box', border:'1px solid '+C.border, borderRadius:10, padding:'10px 12px', fontSize:13.5, color:C.t1, fontFamily:'inherit', background:'#FFFDF8', outline:'none', resize:'none', lineHeight:1.75 }}/>

  );
}

// P_EditMemory — 编辑记忆瞬间（全页版）
// ══════════════════════════════════════════════════
function P_EditMemory() {
  const { navigate, showToast } = useApp();
  const ctxRef = React.useRef(window.__editMemoryCtx ? window.__editMemoryCtx : JSON.parse(sessionStorage.getItem('editMemoryCtx') || '{"isOwner":true}'));
  React.useEffect(()=>{ if(window.__editMemoryCtx){ sessionStorage.setItem('editMemoryCtx', JSON.stringify(window.__editMemoryCtx)); window.__editMemoryCtx = null; } }, []);
  const memCtx = ctxRef.current;
  const isOwner = memCtx.isOwner !== false;
  const anchorId = memCtx.id;
  const [form, setForm] = React.useState({ name:'', year:'', location:'', text:'', img:'' });
  const [tags, setTags] = React.useState([]);
  const [saving, setSaving] = React.useState(false);
  const [uploading, setUploading] = React.useState(false);
  const [familyId, setFamilyId] = React.useState(null);
  const [showDelConfirm, setShowDelConfirm] = React.useState(false);
  const fileRef = React.useRef();
  React.useEffect(()=>{ (async()=>{
    if (!anchorId) return;
    const a = await window.api.anchor.get(anchorId);
    if (a) { setForm({ name:a.name||'', year:a.era||'', location:[a.province,a.city].filter(Boolean).join(' · '), text:a.text||'', img:a.imgUrl||'' }); setTags(a.tags||[]); setFamilyId(a.familyId); }
  })(); }, [anchorId]);
  async function pickImg(e) {
    const file = e.target.files && e.target.files[0]; e.target.value = ''; if (!file) return;
    setUploading(true);
    const r = await window.api.upload.imageCropped(file, 'memories', familyId);
    setUploading(false);
    if (r.ok) setForm(f=>({...f, img:r.url})); else showToast('上传失败：'+(r.error||''));
  }
  async function save() {
    if (!anchorId) { showToast('缺少记忆 id'); return; }
    setSaving(true);
    let newTags = tags;
    const r = await window.api.ai.generateTags(form.text);  // §2.5 正文变更→重新生成标签
    if (r && r.ok && r.tags && r.tags.length) newTags = r.tags;
    const res = await window.api.anchor.update(anchorId, { name:form.name, era:form.year, city: form.location||null, text:form.text, imgUrl: form.img||null, tags:newTags });
    setSaving(false);
    if (res.ok) { showToast('已保存修改'); navigate(-1); } else showToast('保存失败：'+(res.error||''));
  }
  async function removeMemory() {
    if (anchorId) { const r = await window.api.anchor.remove(anchorId); if (!r.ok) { showToast('删除失败：'+(r.error||'')); return; } }
    showToast('已删除'); navigate('P10');
  }
  return (
    <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:44, flexShrink:0 }}/>
      <NavBar title={isOwner ? '编辑记忆' : '查看记忆'} onBack={()=>navigate(-1)}/>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 22px 32px', display:'flex', flexDirection:'column', gap:14 }}>
        {!isOwner && (<div style={{ background:C.warnBg, border:'1px solid '+C.warnBdr, borderRadius:12, padding:'12px 14px', fontSize:12.5, color:C.warn, lineHeight:1.7 }}>这条记忆不是你创建的，仅可查看。</div>)}
        {isOwner
          ? <AppInput label="吃食名" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))}/>
          : <div><div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:4 }}>吃食名</div><div style={{ fontSize:18, fontWeight:800, color:C.t1, fontFamily:'"Noto Serif SC",serif' }}>{form.name}</div></div>
        }

        {/* 图片模块 */}
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:8 }}>记忆图片{isOwner && <span style={{ fontSize:11, color:C.t4, fontWeight:400, marginLeft:6 }}>选填 · 自动裁为 4:3</span>}</div>
          <input ref={fileRef} type="file" accept="image/*" style={{ display:'none' }} onChange={pickImg}/>

              </div>
            )}
          </div>
        </div>
        {/* 年份 — 编辑态用年份数字输入，同编辑个人资料 */}
        {isOwner
          ? <div>
              <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:6 }}>年份</div>

            </div>

        {/* 地点 — 编辑态用 LocationPicker，查看态显示文本 */}
        {isOwner
          ? <LocationPicker label="地点" value={form.location||''} onChange={v=>setForm(f=>({...f,location:v}))}/>
          : <div><div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:4 }}>地点</div><div style={{ fontSize:15, color:C.t1 }}>{form.location||'未设置'}</div></div>
        }
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:C.t2, marginBottom:6 }}>记忆正文</div>
          <textarea value={form.text} onChange={isOwner?(e=>setForm(f=>({...f,text:e.target.value}))):undefined} readOnly={!isOwner} rows={5} style={{ width:'100%', boxSizing:'border-box', border:'1.5px solid '+C.border, borderRadius:12, padding:'12px 14px', fontSize:13.5, color:C.t1, fontFamily:'inherit', background:'#FFFDF8', outline:'none', resize:'none', lineHeight:1.75, opacity:isOwner?1:0.75 }}/>
          {isOwner && (<button onClick={()=>{ window.__p30ctx={ type:'anchor', name:form.name, anchorId:anchorId }; navigate('P30'); }} style={{ marginTop:8, width:'100%', height:42, borderRadius:10, border:'1.5px dashed '+C.primary, background:C.primaryPale, cursor:'pointer', fontFamily:'inherit', fontSize:13, color:C.primary, fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l2 6h6l-5 4 2 6-5-4-5 4 2-6-5-4h6l2-6Z" fill={C.primary}/></svg>让 AI 继续补充细节</button>)}
        </div>
        {/* 标签 — AI 根据正文生成 4-5 个（保存时按新正文重新生成）*/}
        {tags.length>0 && (
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {tags.map(tag=>(
              <span key={tag} style={{ fontSize:11, background:C.primaryPale, color:C.primary, padding:'3px 9px', borderRadius:9999, fontWeight:500 }}>#{tag}</span>
            ))}
          </div>
        )}
        {isOwner && (<>
          <Btn fullWidth size="lg" disabled={saving} onClick={save}>{saving?'保存中…':'保存'}</Btn>
          <div style={{ height:1, background:C.border, margin:'8px 0' }}/>
          {!showDelConfirm && (<button onClick={()=>setShowDelConfirm(true)} style={{ background:'transparent', border:'1px solid rgba(200,60,60,0.25)', borderRadius:12, padding:'14px', cursor:'pointer', fontFamily:'inherit', fontSize:14, color:C.red, display:'flex', alignItems:'center', justifyContent:'center', gap:8, width:'100%' }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke={C.red} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>删除这道记忆</button>)}
          {showDelConfirm && (<div style={{ background:'#FFF0F0', border:'1px solid rgba(200,60,60,0.2)', borderRadius:12, padding:'14px 16px', display:'flex', flexDirection:'column', gap:12 }}><div style={{ fontSize:13.5, color:C.t2, lineHeight:1.8 }}>删除后这道记忆将从味道桌上移除。确认删除吗？</div><div style={{ display:'flex', gap:10 }}><Btn variant="outline" fullWidth size="lg" onClick={()=>setShowDelConfirm(false)}>取消</Btn><Btn fullWidth size="lg" onClick={removeMemory} xstyle={{ background:C.red }}>确认删除</Btn></div></div>)}
        </>)}
      </div>
    </div>
  );
}

// ── 错误边界：单页渲染抛错时不再整屏空白，显示可读错误 + 返回入口 ──
class PageErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error('[页面渲染错误]', err, info); }
  componentDidUpdate(prev) { if (prev.pageKey !== this.props.pageKey && this.state.err) this.setState({ err: null }); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:14, padding:'0 32px', textAlign:'center' }}>
          <div style={{ fontSize:15, fontWeight:700, color:C.t1, fontFamily:'"Noto Serif SC",serif' }}>这一页出了点问题</div>
          <div style={{ fontSize:12, color:C.t3, lineHeight:1.7, maxHeight:160, overflow:'auto', wordBreak:'break-all' }}>{String(this.state.err && (this.state.err.message || this.state.err))}</div>
          <button onClick={()=>{ this.setState({ err:null }); this.props.onReset && this.props.onReset(); }} style={{ height:44, padding:'0 28px', borderRadius:9999, background:C.primary, color:'#fff', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600 }}>返回首页</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ── PhoneApp：应用主体（路由 + Context + Toast），填满父级容器 ──
function PhoneApp() {
  // 应用始终从启动页 P0 进入；忽略并清除 URL 中可能残留的旧 hash（如刷新前停留的页面）
  const initId = () => 'P0';
  const [page, setPage] = React.useState(initId);
  const [history, setHistory] = React.useState([initId()]);
  React.useEffect(()=>{ if(window.location.hash) window.history.replaceState(null,'',window.location.pathname+window.location.search); },[]);
  const [toast, setToast] = React.useState({msg:'',on:false});
  const toastRef = React.useRef();
  function showToast(msg) { clearTimeout(toastRef.current); setToast({msg,on:true}); toastRef.current=setTimeout(()=>setToast(t=>({...t,on:false})),2200); }
  const navigate = React.useCallback((id)=>{
    if (id === -1) {
      setHistory(h=>{ const nh=[...h]; nh.pop(); const prev=nh[nh.length-1]||'P0'; setPage(prev); window.location.hash=prev; return nh; });
    } else {
      setPage(id); window.location.hash=id;
      setHistory(h=>[...h, id]);
    }
  }, []);
  React.useEffect(()=>{
    const onHash = ()=>{ const id=window.location.hash.slice(1); if(SCREENS.find(s=>s.id===id)){ setPage(id); setHistory(h=> h[h.length-1]===id ? h : [...h,id]); } };
    window.addEventListener('hashchange', onHash);
    return ()=>window.removeEventListener('hashchange', onHash);
  }, []);
  const cur = SCREENS.find(s=>s.id===page)||SCREENS[0];
  const prevId = history.length>1?history[history.length-2]:null;
  const [dir, setDir] = React.useState(1);
  React.useEffect(()=>{ const inner=SCREENS.find(s=>s.id===page); setDir(inner?.group==='内页'?1:prevId&&SCREENS.findIndex(s=>s.id===page)>SCREENS.findIndex(s=>s.id===prevId)?1:-1); },[page]);
  return (
    <AppContext.Provider value={{ navigate, showToast }}>
      <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden', background:'#FFFDF8' }}>
        <StatusBar/>
        <div key={page} style={{ position:'absolute', inset:0, animation:`slideIn${dir>0?'Right':'Left'} 0.28s cubic-bezier(0.32,0,0.2,1) forwards` }}>
          <PageErrorBoundary pageKey={page} onReset={()=>navigate('P10')}>
            <cur.Comp/>
          </PageErrorBoundary>
        </div>
        <Toast message={toast.msg} visible={toast.on}/>
      </div>
    </AppContext.Provider>
  );
}

// ── App：真实应用外壳 ──
// 移动端：铺满整个视口；桌面端：居中为手机宽度（最大 430）的可用列，两侧留深色背景
function App() {
  const isWide = () => typeof window !== 'undefined' && window.innerWidth > 520;
  const [wide, setWide] = React.useState(isWide);
  React.useEffect(()=>{
    const onResize = ()=>setWide(isWide());
    window.addEventListener('resize', onResize);
    return ()=>window.removeEventListener('resize', onResize);
  },[]);
  return (
    <div style={{ width:'100%', height:'100%', display:'flex', justifyContent:'center', alignItems:'center', background: wide ? C.primaryPale : '#FFFDF8', fontFamily:'system-ui,-apple-system,"PingFang SC","Helvetica Neue",sans-serif' }}>
      <div style={{ position:'relative', width:'100%', maxWidth: wide ? 430 : '100%', height:'100%', overflow:'hidden', background:'#FFFDF8', boxShadow: wide ? '0 16px 50px rgba(40,91,78,0.18)' : 'none' }}>
        <PhoneApp/>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
